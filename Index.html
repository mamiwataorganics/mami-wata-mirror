  function eclToSvg(lon){return 180+(lon-ascLon);}
  function polar(cx,cy,r,deg){var rad=(deg*Math.PI)/180;return{x:cx+r*Math.cos(rad),y:cy-r*Math.sin(rad)};}
  var cx=300,cy=300;
  var svg='<svg class="wheel" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="280" fill="none" stroke="#d4b675" stroke-width="1" opacity="0.7"/><circle cx="'+cx+'" cy="'+cy+'" r="250" fill="none" stroke="#d4b675" stroke-width="1" opacity="0.7"/><circle cx="'+cx+'" cy="'+cy+'" r="190" fill="none" stroke="#e8e1cc" stroke-width="0.5" opacity="0.2"/>';
  for(var i=0;i<12;i++){var a=eclToSvg(i*30),p1=polar(cx,cy,250,a),p2=polar(cx,cy,280,a);svg+='<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#d4b675" stroke-width="1" opacity="0.5"/>';}
  for(var d=0;d<360;d++){var a=eclToSvg(d),iM=d%10===0,tL=iM?6:(d%5===0?4:2),tp1=polar(cx,cy,280,a),tp2=polar(cx,cy,280-tL,a);svg+='<line x1="'+tp1.x+'" y1="'+tp1.y+'" x2="'+tp2.x+'" y2="'+tp2.y+'" stroke="#d4b675" stroke-width="'+(iM?1:0.5)+'" opacity="'+(iM?0.85:0.4)+'"/>';}
  for(var s=0;s<12;s++){var sa=eclToSvg(s*30+15),sp=polar(cx,cy,265,sa),sn=SIGN_NAMES[s];svg+='<g class="interactive" onclick="window._mami.showSignInterp(\''+sn+'\')"><circle cx="'+sp.x+'" cy="'+sp.y+'" r="14" fill="transparent"/><text x="'+sp.x+'" y="'+sp.y+'" text-anchor="middle" dominant-baseline="central" fill="#e9cb8a" font-size="22" font-family="Cinzel, serif">'+SIGN_SYMBOLS[s]+'</text></g>';}
  if(houses){for(var hi=0;hi<houses.length;hi++){var h=houses[hi],ha=eclToSvg(h.eclipticLongitude),hp1=polar(cx,cy,80,ha),hp2=polar(cx,cy,250,ha),iA=[0,3,6,9].indexOf(hi)!==-1;svg+='<line x1="'+hp1.x+'" y1="'+hp1.y+'" x2="'+hp2.x+'" y2="'+hp2.y+'" stroke="#e8e1cc" stroke-width="'+(iA?1:0.5)+'" opacity="'+(iA?0.6:0.3)+'"/>';var nh=houses[(hi+1)%12],ml=(h.eclipticLongitude+nh.eclipticLongitude)/2;if(nh.eclipticLongitude<h.eclipticLongitude)ml=((h.eclipticLongitude+nh.eclipticLongitude+360)/2)%360;var ma=eclToSvg(ml),np=polar(cx,cy,100,ma);svg+='<g class="interactive" onclick="window._mami.showHouseInterp('+h.number+')"><circle cx="'+np.x+'" cy="'+np.y+'" r="12" fill="transparent"/><text x="'+np.x+'" y="'+np.y+'" text-anchor="middle" dominant-baseline="central" fill="#b8b09a" font-size="13" font-style="italic" font-family="Cormorant Garamond, serif">'+h.number+'</text></g>';}}
  if(aspects&&aspects.length){var aC={conjunction:"#e9cb8a",opposition:"#c44536",trine:"#6b8e4e",square:"#c44536",sextile:"#4a6b8e"};for(var ai=0;ai<aspects.length;ai++){var asp=aspects[ai],pa1=null,pa2=null;for(var pi=0;pi<planets.length;pi++){if(planets[pi].name===asp.point1)pa1=planets[pi];if(planets[pi].name===asp.point2)pa2=planets[pi];}if(asp.point1==="Ascendant")pa1={eclipticLongitude:ascLon};if(asp.point1==="Midheaven")pa1={eclipticLongitude:mcLon};if(asp.point2==="Ascendant")pa2={eclipticLongitude:ascLon};if(asp.point2==="Midheaven")pa2={eclipticLongitude:mcLon};if(!pa1||!pa2)continue;var aa1=eclToSvg(pa1.eclipticLongitude),aa2=eclToSvg(pa2.eclipticLongitude),ap1=polar(cx,cy,160,aa1),ap2=polar(cx,cy,160,aa2),co=aC[asp.type]||"#888",dh=(asp.type==="square"||asp.type==="opposition")?'stroke-dasharray="2,3"':"";svg+='<line x1="'+ap1.x+'" y1="'+ap1.y+'" x2="'+ap2.x+'" y2="'+ap2.y+'" stroke="'+co+'" stroke-width="0.7" opacity="0.55" '+dh+'/>';}}
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="80" fill="none" stroke="#d4b675" stroke-width="0.5" opacity="0.4"/>';
  if(ascLon!==undefined){var aL=polar(cx,cy,298,eclToSvg(ascLon));svg+='<text x="'+aL.x+'" y="'+aL.y+'" text-anchor="middle" dominant-baseline="central" fill="#e9cb8a" font-size="10" letter-spacing="2" font-family="Cinzel, serif">ASC</text>';}
  if(mcLon!==undefined){var mL=polar(cx,cy,298,eclToSvg(mcLon));svg+='<text x="'+mL.x+'" y="'+mL.y+'" text-anchor="middle" dominant-baseline="central" fill="#e9cb8a" font-size="10" letter-spacing="2" font-family="Cinzel, serif">MC</text>';}
  var rR=opt.ringRadius||215,pCo=opt.planetColor||"#e9cb8a",pS=planets||[];
  var sd=[];for(var pj=0;pj<pS.length;pj++)sd.push({p:pS[pj],idx:pj});
  sd.sort(function(a,b){return a.p.eclipticLongitude-b.p.eclipticLongitude;});
  var nu=new Array(pS.length);for(var nz=0;nz<nu.length;nz++)nu[nz]=0;
  for(var si=1;si<sd.length;si++){var df=Math.abs(sd[si].p.eclipticLongitude-sd[si-1].p.eclipticLongitude);if(df>180)df=360-df;if(df<7)nu[sd[si].idx]=nu[sd[si-1].idx]+18;}
  var planetsKey=opt.planetsKey||"_natalPlanets";
  window[planetsKey]=pS;
  for(var pk=0;pk<pS.length;pk++){var p=pS[pk],pA=eclToSvg(p.eclipticLongitude),aR=rR+nu[pk],po=polar(cx,cy,aR,pA),tS=polar(cx,cy,250,pA),tE=polar(cx,cy,aR+12,pA);svg+='<line x1="'+tS.x+'" y1="'+tS.y+'" x2="'+tE.x+'" y2="'+tE.y+'" stroke="'+pCo+'" stroke-width="0.5" opacity="0.45"/>';svg+='<g class="interactive" onclick="window._mami.showPlanetInterp(window.'+planetsKey+'['+pk+'])"><circle cx="'+po.x+'" cy="'+po.y+'" r="14" fill="#060914" stroke="'+pCo+'" stroke-width="0.7"/><text x="'+po.x+'" y="'+po.y+'" text-anchor="middle" dominant-baseline="central" fill="'+pCo+'" font-size="14" font-family="Cinzel, serif">'+p.symbol+'</text></g>';var dP=polar(cx,cy,aR+22,pA),rx=p.retrograde?'<tspan fill="#c44536" font-size="7"> R</tspan>':'';svg+='<text x="'+dP.x+'" y="'+dP.y+'" text-anchor="middle" dominant-baseline="central" fill="'+pCo+'" font-size="9" font-family="Cinzel, serif">'+(p.degreesInSign!==undefined?p.degreesInSign+'\u00B0':'')+rx+'</text>';}
  if(opt.overlayPlanets){var ov=opt.overlayPlanets,oC=opt.overlayColor||"#4a6b8e",oR=opt.overlayRingRadius||240,oKey=opt.overlayKey||"_overlayPlanets";window[oKey]=ov;for(var op=0;op<ov.length;op++){var o=ov[op],oA=eclToSvg(o.eclipticLongitude),oP=polar(cx,cy,oR,oA);svg+='<g class="interactive" onclick="window._mami.showPlanetInterp(window.'+oKey+'['+op+'])"><circle cx="'+oP.x+'" cy="'+oP.y+'" r="12" fill="#060914" stroke="'+oC+'" stroke-width="0.7"/><text x="'+oP.x+'" y="'+oP.y+'" text-anchor="middle" dominant-baseline="central" fill="'+oC+'" font-size="12" font-family="Cinzel, serif">'+o.symbol+'</text></g>';}}
  svg+='</svg>';return svg;
}

function tableOfPlanets(t,p,wH,clickKey){
  window[clickKey]=p;
  var h='<div class="section-title">'+t+'</div><div class="tap-hint">Tap any row to read its meaning</div><table class="data-table"><thead><tr><th>Point</th><th>Sign</th><th>Position</th>'+(wH?'<th>House</th>':'')+'</tr></thead><tbody>';
  p.forEach(function(pt,i){var rx=pt.retrograde?' <span style="color:#c44536;font-size:11px;">\u211E</span>':'';h+='<tr class="clickable" onclick="window._mami.showPlanetInterp(window.'+clickKey+'['+i+'])"><td>'+pt.symbol+' '+pt.name+rx+'</td><td>'+pt.signSymbol+' '+pt.sign+'</td><td><span class="deg">'+pt.degreesInSign+'\u00B0</span> '+String(pt.minutes).padStart(2,"0")+"\u2032"+(pt.seconds!==undefined?String(pt.seconds).padStart(2,"0")+"\u2033":'')+'</td>'+(wH?'<td>'+(pt.house||"\u2014")+'</td>':'')+'</tr>';});
  h+='</tbody></table>';return h;
}
function tableOfHouses(hs){
  window._housesData=hs;

function tableOfAspects(t,a,clickKey){
  if(!a||!a.length)return'';
  window[clickKey]=a;
  var h='<div class="section-title">'+t+'</div><div class="tap-hint">Tap any row to read its meaning</div><table class="data-table"><thead><tr><th>From</th><th>Aspect</th><th>To</th><th>Orb</th></tr></thead><tbody>';
  var mx=Math.min(60,a.length);
  for(var i=0;i<mx;i++){var x=a[i];h+='<tr class="clickable" onclick="window._mami.showAspectInterp(window.'+clickKey+'['+i+'])"><td>'+x.point1+'</td><td>'+x.type+'</td><td>'+x.point2+'</td><td>'+parseFloat(x.orb).toFixed(2)+'\u00B0</td></tr>';}
  h+='</tbody></table>';return h;
}

    }
    if(activated){
      svg+='<g class="interactive" onclick="window._mami.showGateInterp('+g+',null,null,\''+(bP&&bD?"Both Personality & Design":bP?"Personality (Conscious)":"Design (Unconscious)")+'\')"><circle cx="'+pos.x+'" cy="'+pos.y+'" r="9" fill="'+bgFill+'" stroke="#d4b675" stroke-width="0.8"/><text x="'+pos.x+'" y="'+pos.y+'" text-anchor="middle" dominant-baseline="central" fill="'+textColor+'" font-size="9" font-weight="bold" font-family="Cinzel, serif" pointer-events="none">'+g+'</text></g>';
    }else{
      svg+='<g class="interactive" onclick="window._mami.showGateInterp('+g+',null,null,\'Not activated\')"><circle cx="'+pos.x+'" cy="'+pos.y+'" r="8" fill="'+bgFill+'" stroke="rgba(212,182,117,0.3)" stroke-width="0.5"/><text x="'+pos.x+'" y="'+pos.y+'" text-anchor="middle" dominant-baseline="central" fill="'+textColor+'" font-size="8" font-family="Cinzel, serif" pointer-events="none" opacity="0.7">'+g+'</text></g>';
    }
  });
  svg+='</svg>';
  html+=svg;
  html+='<div class="legend" style="margin-top:8px;"><span class="swatch" style="background:#e9cb8a;"></span>Both &nbsp; <span class="swatch" style="background:#0a0a0a;border:1px solid #d4b675;"></span>Personality &nbsp; <span class="swatch" style="background:#c44536;"></span>Design</div>';
  html+='<div class="ornament-divider">\u2756 \u272A \u2756</div>';
  html+='<div class="section-title">Personality (Conscious) Activations</div><div class="tap-hint">Tap any gate to read its meaning</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.personalityPlanets.forEach(function(pl,i){var dms=splitDMS(pl.longitude);html+='<tr class="clickable" onclick="window._mami.showGateInterp('+pl.gate+','+pl.line+',\''+pl.name+'\',\'Personality (Conscious)\')"><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"\u2032</td></tr>";});
  html+='</tbody></table>';
  html+='<div class="section-title">Design (Unconscious) Activations</div><div class="tap-hint">Tap any gate to read its meaning</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.designPlanets.forEach(function(pl,i){var dms=splitDMS(pl.longitude);html+='<tr class="clickable" onclick="window._mami.showGateInterp('+pl.gate+','+pl.line+',\''+pl.name+'\',\'Design (Unconscious)\')"><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg" style="color:#c44536;">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"\u2032</td></tr>";});
  html+='</tbody></table>';
  html+='<div class="section-title">Defined Channels</div><div class="tap-hint">Tap any channel to read its meaning</div>';
  if(d.definedChannels.length===0){html+='<p style="color:#b8b09a;font-style:italic;text-align:center;padding:14px;">No defined channels.</p>';}else{html+='<table class="data-table"><thead><tr><th>Channel</th><th>Name</th><th>Centers</th></tr></thead><tbody>';d.definedChannels.forEach(function(c){html+='<tr class="clickable" onclick="window._mami.showChannelInterp('+c[0]+','+c[1]+')"><td><span class="deg">'+c[0]+'\u2014'+c[1]+'</span></td><td>'+c[2]+'</td><td>'+HD_GATE_CENTERS[c[0]]+' \u2194 '+HD_GATE_CENTERS[c[1]]+'</td></tr>';});html+='</tbody></table>';}
  html+='<div class="section-title">Centers</div><div class="tap-hint">Tap any center to read its meaning</div><table class="data-table"><thead><tr><th>Center</th><th>State</th></tr></thead><tbody>';
  Object.keys(BODYGRAPH_CENTERS).forEach(function(cn){var defined=d.definedCenters[cn];html+='<tr class="clickable" onclick="window._mami.showCenterInterp(\''+cn+'\','+(defined?'true':'false')+')"><td>'+cn+'</td><td>'+(defined?'<span style="color:#e9cb8a;">Defined</span>':'<span style="color:#b8b09a;">Open</span>')+'</td></tr>';});
  html+='</tbody></table>';
  html+='<div class="section-title">Incarnation Cross</div><p style="color:#e9cb8a;font-style:italic;text-align:center;padding:14px 0;font-size:17px;">'+d.incarnationCross+'</p>';
  html+='</div>';
  resultDiv.innerHTML=html;
}

function renderAstrocartography(d,natal){
  var W=900,H=480;
  var TOP=28,BOT=38;
  function lonToX(lon){return (lon+180)*W/360;}
  function latToY(lat){return TOP+(85-lat)*(H-TOP-BOT)/170;}

  // Continent blobs - approximated by lat/lon control points
  function blobPath(pts){
    var path="M "+lonToX(pts[0][1])+" "+latToY(pts[0][0]);
    for(var i=1;i<pts.length;i++){path+=" L "+lonToX(pts[i][1])+" "+latToY(pts[i][0]);}
    path+=" Z";
    return path;
  }
  var BLOBS=[
    [[60,-130],[62,-110],[60,-90],[55,-75],[45,-65],[35,-70],[25,-80],[20,-100],[28,-115],[42,-125]],
    [[22,-100],[18,-92],[12,-85],[8,-78],[12,-82],[16,-88],[20,-95]],
    [[10,-75],[5,-55],[-5,-45],[-15,-40],[-25,-45],[-35,-55],[-45,-65],[-55,-70],[-45,-75],[-30,-72],[-15,-75],[0,-78]],
    [[75,-50],[78,-30],[72,-25],[65,-35],[68,-50]],
    [[60,-5],[62,10],[60,25],[55,35],[50,40],[42,25],[38,10],[42,0],[50,-8]],
    [[58,-8],[60,-2],[55,0],[50,-5],[52,-10]],
    [[35,-10],[38,10],[35,30],[25,40],[15,45],[0,42],[-15,35],[-30,25],[-35,18],[-30,12],[-15,10],[0,5],[15,-5],[28,-15]],
    [[-12,45],[-15,50],[-22,50],[-25,47],[-22,43],[-15,43]],
    [[70,30],[72,60],[70,90],[65,120],[60,140],[50,145],[40,140],[30,130],[25,110],[20,90],[15,75],[25,60],[30,45],[40,35],[55,30]],
    [[28,70],[25,78],[18,80],[10,78],[8,75],[15,70],[22,68]],
    [[10,95],[8,105],[5,115],[-5,120],[-8,130],[-2,125],[5,115],[10,105]],
    [[45,138],[42,145],[35,140],[32,132],[38,130],[43,132]],
    [[-12,130],[-15,145],[-25,155],[-35,150],[-38,140],[-35,125],[-25,115],[-15,120]]
  ];

  var CITIES=[
    ["New York",40.71,-74.01],
    ["Los Angeles",34.05,-118.24],
    ["Houston",29.76,-95.37],
    ["Toronto",43.65,-79.38],
    ["Miami",25.77,-80.19],
    ["Mexico City",19.43,-99.13],
    ["São Paulo",-23.55,-46.63],
    ["Buenos Aires",-34.6,-58.4],
    ["London",51.51,-0.13],
    ["Paris",48.86,2.35],
    ["Lagos",6.52,3.38],
    ["Cairo",30.04,31.24],
    ["Cape Town",-33.92,18.42],
    ["Mumbai",19.08,72.88],
    ["Tokyo",35.68,139.65],
    ["Sydney",-33.87,151.21],
    ["Honolulu",21.31,-157.86]
  ];

  var html='<div class="chart-wrapper"><h2>'+getName()+' Astrocartography</h2><div class="chart-meta">Planetary lines on the world map · '+(natal.engine||'')+'</div>';
  html+='<p style="text-align:center;color:var(--ink-soft);font-style:italic;margin-bottom:16px;font-size:14px;">Each line shows where a planet’s energy is strongest. Living, traveling, or working near these lines amplifies that planet’s themes in your life.</p>';

  var svg='<svg class="astromap" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="background:#0a1326;border:1px solid rgba(232,225,204,0.2);">';
  svg+='<rect x="0" y="'+TOP+'" width="'+W+'" height="'+(H-TOP-BOT)+'" fill="#0d1830"/>';

  // Grid
  for(var glon=-150;glon<=150;glon+=30){
    svg+='<line x1="'+lonToX(glon)+'" y1="'+TOP+'" x2="'+lonToX(glon)+'" y2="'+(H-BOT)+'" stroke="rgba(232,225,204,0.05)" stroke-width="0.3"/>';
  }
  for(var glat=-60;glat<=60;glat+=30){
    svg+='<line x1="0" y1="'+latToY(glat)+'" x2="'+W+'" y2="'+latToY(glat)+'" stroke="rgba(232,225,204,0.05)" stroke-width="0.3"/>';
  }
  svg+='<line x1="0" y1="'+latToY(0)+'" x2="'+W+'" y2="'+latToY(0)+'" stroke="rgba(232,225,204,0.12)" stroke-width="0.5" stroke-dasharray="3,3"/>';

  // Continent blobs
  BLOBS.forEach(function(b){
    svg+='<path d="'+blobPath(b)+'" fill="rgba(184,176,154,0.13)" stroke="rgba(232,225,204,0.3)" stroke-width="0.6"/>';
  });

  // Planet lines (collect MC/IC for staggered labels)
  var mcTopGroups={},icBotGroups={};
  d.lines.forEach(function(line){
    var col=line.color;
    if(line.type==="MC"||line.type==="IC"){
      var x=lonToX(line.lon);
      var dash=line.type==="IC"?'stroke-dasharray="4,3"':'';
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><line x1="'+x+'" y1="'+TOP+'" x2="'+x+'" y2="'+(H-BOT)+'" stroke="'+col+'" stroke-width="1.4" opacity="0.9" '+dash+'/></g>';
      var bucket=Math.round(x/22);
      if(line.type==="MC"){
        if(!mcTopGroups[bucket])mcTopGroups[bucket]=[];
        mcTopGroups[bucket].push({x:x,symbol:line.symbol,color:line.color,planet:line.planet});
      }else{
        if(!icBotGroups[bucket])icBotGroups[bucket]=[];
        icBotGroups[bucket].push({x:x,symbol:line.symbol,color:line.color,planet:line.planet});
      }
    }else{
      if(!line.points||line.points.length<2)return;
      var dash=line.type==="DSC"?'stroke-dasharray="4,3"':'';
      var pts=line.points.slice().sort(function(a,b){return a.lat-b.lat;});
      var segments=[[]],lastLon=null;
      pts.forEach(function(p){
        if(lastLon!==null&&Math.abs(p.lon-lastLon)>180){segments.push([]);}
        segments[segments.length-1].push(p);
        lastLon=p.lon;
      });
      segments.forEach(function(seg){
        if(seg.length<2)return;
        var path='M ';
        seg.forEach(function(p,i){path+=(i?' L ':'')+lonToX(p.lon)+' '+latToY(p.lat);});
        svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="1.4" opacity="0.9" '+dash+'/></g>';
        if(seg.length>3){
          var mid=seg[Math.floor(seg.length/2)];
          var mx=lonToX(mid.lon),my=latToY(mid.lat);
          svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><circle cx="'+mx+'" cy="'+my+'" r="9" fill="#0a1326" stroke="'+col+'" stroke-width="0.8"/><text x="'+mx+'" y="'+my+'" text-anchor="middle" dominant-baseline="central" fill="'+col+'" font-size="10" font-weight="bold" font-family="Cinzel, serif">'+line.symbol+'</text></g>';
        }
      });
    }
  });

  // MC labels at top, staggered by planet's own color
  Object.keys(mcTopGroups).forEach(function(b){
    var group=mcTopGroups[b];
    group.forEach(function(g,i){
      var staggerY=i%2===0?14:24;
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+g.planet+'\',\'MC\')"><text x="'+g.x+'" y="'+staggerY+'" text-anchor="middle" fill="'+g.color+'" font-size="13" font-family="Cinzel, serif" font-weight="bold">'+g.symbol+'</text></g>';
    });
  });

  // IC labels at bottom, staggered - well within viewport
  Object.keys(icBotGroups).forEach(function(b){
    var group=icBotGroups[b];
    group.forEach(function(g,i){
      var staggerY=H-22-(i%2===0?0:10);
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+g.planet+'\',\'IC\')"><text x="'+g.x+'" y="'+staggerY+'" text-anchor="middle" fill="'+g.color+'" font-size="13" font-family="Cinzel, serif" font-weight="bold" font-style="italic">'+g.symbol+'</text></g>';
    });
  });

  // Cities drawn LAST so they sit on top of everything - with dark halo for readability
  CITIES.forEach(function(c){
    var cx=lonToX(c[2]),cy=latToY(c[1]);
    // Dark halo behind text
    svg+='<rect x="'+(cx+3)+'" y="'+(cy-5)+'" width="'+(c[0].length*6+4)+'" height="12" fill="rgba(10,19,38,0.85)" rx="2"/>';
    // White city dot with dark ring
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="#0a1326" stroke="#ffffff" stroke-width="1.5"/>';
    svg+='<text x="'+(cx+6)+'" y="'+(cy+4)+'" fill="#ffffff" font-size="10" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="500">'+c[0]+'</text>';
  });

  svg+='</svg>';
  html+=svg;

  html+='<p style="text-align:center;color:var(--ink-faint);font-style:italic;margin-top:10px;font-size:12px;">Planet symbols at the <strong style="color:var(--ink-soft);">top</strong> mark MC lines (solid, vertical). Symbols at the <strong style="color:var(--ink-soft);">bottom</strong> mark IC lines (dashed, vertical). Symbols <strong style="color:var(--ink-soft);">on curves</strong> mark ASC (solid) and DSC (dashed) lines.</p>';

  html+='<div class="section-title">Planet Lines</div><div class="tap-hint">Tap any line on the map or any cell below for its full reading</div>';
  html+='<table class="data-table"><thead><tr><th>Planet</th><th>MC</th><th>IC</th><th>ASC</th><th>DSC</th></tr></thead><tbody>';
  d.planets.forEach(function(pl){
    html+='<tr><td style="color:'+pl.color+';">'+pl.symbol+' '+pl.name+'</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'MC\')" style="cursor:pointer;">MC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'IC\')" style="cursor:pointer;">IC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'ASC\')" style="cursor:pointer;">ASC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'DSC\')" style="cursor:pointer;">DSC</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  html+='<p style="text-align:center;color:var(--ink-faint);font-style:italic;margin-top:18px;font-size:13px;">Solid lines = MC and ASC. Dashed lines = IC and DSC.</p>';
  html+='</div>';
  resultDiv.innerHTML=html;
}

window.addEventListener('load',restoreState);
</script>
</body>
</html>
