<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mami Wata's Mirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #060914;
    --bg-card: #0d1226;
    --bg-card-soft: rgba(255,255,255,0.03);
    --ink: #f4ecd8;
    --ink-soft: #b8b09a;
    --ink-faint: #6b6451;
    --gold: #e8e1cc;
    --gold-bright: #f4ecd8;
    --gold-deep: #b8b09a;
    --pearl: #e8e1cc;
    --accent-rose: #c44536;
    --accent-sage: #6b8e4e;
    --accent-blue: #4a6b8e;
    --line: rgba(212,182,117,0.25);
    --line-faint: rgba(212,182,117,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg-deep); }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--ink);
    min-height: auto;
    padding: 16px 16px 16px;
    line-height: 1.5;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(74,107,142,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(212,182,117,0.08) 0%, transparent 60%),
      radial-gradient(circle at 50% 50%, #0a0f24 0%, #060914 100%);
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 14% 22%, rgba(255,255,255,0.5) 50%, transparent 100%),
      radial-gradient(1px 1px at 78% 14%, rgba(255,255,255,0.4) 50%, transparent 100%),
      radial-gradient(1px 1px at 33% 67%, rgba(255,255,255,0.55) 50%, transparent 100%),
      radial-gradient(1px 1px at 88% 80%, rgba(255,255,255,0.35) 50%, transparent 100%),
      radial-gradient(1px 1px at 55% 36%, rgba(255,255,255,0.5) 50%, transparent 100%),
      radial-gradient(1px 1px at 5% 88%, rgba(255,255,255,0.4) 50%, transparent 100%),
      radial-gradient(1px 1px at 95% 45%, rgba(255,255,255,0.45) 50%, transparent 100%),
      radial-gradient(1px 1px at 42% 8%, rgba(255,255,255,0.3) 50%, transparent 100%),
      radial-gradient(1px 1px at 67% 92%, rgba(255,255,255,0.5) 50%, transparent 100%);
    z-index: 0;
  }
  .container { max-width: 920px; margin: 0 auto; position: relative; z-index: 1; }
  .masthead { text-align: center; margin-bottom: 28px; }
  .masthead h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .masthead .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.4em;
    margin: 10px 0 4px;
  }
  .masthead .tagline {
    font-style: italic;
    color: var(--ink-soft);
    font-size: 16px;
    letter-spacing: 0.05em;
  }
  .ornament-divider {
    text-align: center;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 0.6em;
    margin: 18px 0;
    opacity: 0.7;
  }
  .engine-status {
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-family: 'Cinzel', serif;
  }
  .engine-status.ready { color: var(--accent-sage); }
  .engine-status.error { color: var(--accent-rose); }
  .saved-banner {
    background: rgba(107,142,78,0.12);
    border: 1px solid rgba(107,142,78,0.4);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--gold-bright);
    font-style: italic;
    text-align: center;
    transition: opacity 0.6s;
  }
  .transit-banner {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 14px 18px;
    margin-bottom: 20px;
    text-align: center;
  }
  .transit-banner a {
    color: var(--ink);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .transit-banner a:hover { color: #fff; }
  .transit-banner .arrow { margin-left: 8px; }
  .form-card {
    background: linear-gradient(180deg, rgba(13,18,38,0.85) 0%, rgba(6,9,20,0.85) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    padding: 28px 22px;
    margin-bottom: 28px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(212,182,117,0.08);
    position: relative;
  }
  .form-card::before, .form-card::after {
    content: '\2756';
    position: absolute;
    color: var(--gold);
    font-size: 11px;
    opacity: 0.6;
  }
  .form-card::before { top: 8px; left: 12px; }
  .form-card::after { bottom: 8px; right: 12px; }
  .form-section {
    border-top: 1px solid var(--line-faint);
    padding-top: 18px;
    margin-top: 18px;
  }
  .form-section.first { border-top: none; padding-top: 0; margin-top: 0; }
  .form-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 14px;
    font-weight: 500;
  }
  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    margin-top: 14px;
    font-weight: 500;
  }
  label:first-child { margin-top: 0; }
  input, select {
    width: 100%;
    min-width: 0;
    padding: 12px 14px;
    font-size: 16px;
    background: #ffffff !important;
    color: #1a1a1a !important;
    border: 1px solid var(--line);
    font-family: 'Cormorant Garamond', Georgia, serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-text-fill-color: #1a1a1a;
  }
  input::placeholder { color: #888; opacity: 0.8; }
  input::-webkit-input-placeholder { color: #888; }
  input::-webkit-datetime-edit { color: #1a1a1a; }
  input::-webkit-datetime-edit-fields-wrapper { color: #1a1a1a; }
  input::-webkit-datetime-edit-text { color: #555; }
  input::-webkit-datetime-edit-month-field,
  input::-webkit-datetime-edit-day-field,
  input::-webkit-datetime-edit-year-field,
  input::-webkit-datetime-edit-hour-field,
  input::-webkit-datetime-edit-minute-field,
  input::-webkit-datetime-edit-ampm-field { color: #1a1a1a; }
  input::-webkit-calendar-picker-indicator { cursor: pointer; }
  select option { background: #ffffff; color: #1a1a1a; }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,182,117,0.1);
  }
  select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='%23d4b675'><path d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 10px;
    padding-right: 36px;
  }
  .row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; }
  @media (max-width: 540px) { .row { grid-template-columns: 1fr; } }
  .helper {
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 6px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }
  .selected-loc {
    color: var(--gold-bright);
    font-style: italic;
    font-size: 14px;
    margin-top: 8px;
  }
  button.primary {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: #ffffff;
    color: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.9);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.5);
  }
  button.primary:hover { transform: translateY(-1px); background: #f4ecd8; box-shadow: 0 12px 32px -10px rgba(0,0,0,0.6); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .clear-link {
    display: block;
    text-align: center;
    margin-top: 14px;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(184,176,154,0.4);
    padding: 4px;
    width: 100%;
  }
  .clear-link:hover { color: var(--ink); }
  .location-results {
    background: #ffffff;
    border: 1px solid var(--line);
    border-top: none;
    max-height: 220px;
    overflow-y: auto;
  }
  .location-result {
    padding: 11px 14px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    font-size: 14px;
    color: #1a1a1a;
  }
  .location-result:hover { background: #f4ecd8; color: #1a1a1a; }
  .location-result:last-child { border-bottom: none; }
  .hidden { display: none !important; }
  #result { margin-top: 0; }
  #result:not(:empty) { margin-top: 32px; }
  .chart-wrapper {
    background: linear-gradient(180deg, rgba(13,18,38,0.7) 0%, rgba(6,9,20,0.7) 100%);
    backdrop-filter: blur(8px);
    padding: 28px 22px;
    border: 1px solid var(--line);
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
    position: relative;
  }
  .chart-wrapper::before, .chart-wrapper::after {
    content: '\2756';
    position: absolute;
    color: var(--gold);
    font-size: 11px;
    opacity: 0.6;
  }
  .chart-wrapper::before { top: 8px; left: 12px; }
  .chart-wrapper::after { bottom: 8px; right: 12px; }
  .chart-wrapper h2 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-align: center;
    color: var(--gold-bright);
    margin-bottom: 4px;
  }
  .chart-meta {
    text-align: center;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 16px;
    font-style: italic;
  }
  svg.wheel, svg.bodygraph, svg.astromap {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
  svg.wheel { width: 100%; max-width: 480px; }
  svg.bodygraph { width: 100%; max-width: 420px; }
  svg.wheel .interactive, svg.bodygraph .interactive, svg.astromap .interactive { cursor: pointer; }
  svg.wheel .interactive:hover, svg.bodygraph .interactive:hover, svg.astromap .interactive:hover { filter: brightness(1.3); }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 15px;
  }
  .data-table th {
    text-align: left;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 10px 8px;
    border-bottom: 1px solid var(--line);
    font-weight: 500;
  }
  .data-table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--line-faint);
  }
  .data-table tr.clickable { cursor: pointer; transition: background 0.15s; }
  .data-table tr.clickable:hover { background: rgba(212,182,117,0.06); }
  .data-table tr.clickable td:first-child { color: var(--gold-bright); }
  .data-table .deg { color: var(--gold-bright); font-weight: 500; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 28px 0 4px;
    text-align: center;
    font-weight: 500;
  }
  .section-title::before, .section-title::after {
    content: '\2756';
    margin: 0 12px;
    opacity: 0.5;
    font-size: 9px;
  }
  .section-sub {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 14px;
  }
  .error {
    background: rgba(196,69,54,0.12);
    border: 1px solid var(--accent-rose);
    padding: 16px;
    color: var(--ink);
    margin-top: 16px;
    font-style: italic;
  }
  .loading {
    text-align: center;
    color: var(--gold);
    padding: 32px;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 0.05em;
  }
  .loading::before {
    content: '\2756';
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
  .hd-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin: 18px 0 20px;
  }
  .hd-summary-item {
    background: rgba(0,0,0,0.35);
    padding: 14px 10px;
    text-align: center;
    border: 1px solid var(--line-faint);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .hd-summary-item:hover { border-color: var(--gold); transform: translateY(-2px); }
  .hd-summary-item .label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .hd-summary-item .value {
    font-size: 16px;
    color: var(--ink);
    font-style: italic;
    line-height: 1.2;
  }
  .legend {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 12px;
    font-style: italic;
  }
  .legend .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  @media (min-width: 700px) { .modal-backdrop { align-items: center; padding: 32px; } }
  .modal-backdrop.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(180deg, #0d1226 0%, #060914 100%);
    border: 1px solid var(--gold);
    box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(212,182,117,0.15);
    max-width: 560px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 24px 22px 28px;
    position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal::before, .modal::after {
    content: '\2756';
    position: absolute;
    color: var(--gold);
    font-size: 11px;
    opacity: 0.7;
  }
  .modal::before { top: 10px; left: 14px; }
  .modal::after { bottom: 10px; right: 14px; }
  .modal-close {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 24px;
    cursor: pointer;
    width: 36px;
    height: 36px;
    line-height: 1;
    padding: 0;
    margin: 0;
    letter-spacing: 0;
  }
  .modal-close:hover { color: var(--gold-bright); }
  .modal-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
    margin-top: 4px;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--gold-bright);
    text-align: center;
    margin-bottom: 4px;
  }
  .modal-subtitle {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 15px;
    margin-bottom: 16px;
  }
  .modal-divider {
    text-align: center;
    color: var(--gold);
    margin: 14px 0 16px;
    letter-spacing: 0.5em;
    font-size: 11px;
    opacity: 0.6;
  }
  .modal-body {
    color: var(--ink);
    font-size: 16px;
    line-height: 1.65;
  }
  .modal-body p { margin-bottom: 12px; }
  .modal-body strong {
    color: var(--gold-bright);
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .modal-body .field-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--line-faint);
    font-size: 14px;
  }
  .modal-body .field-row:last-child { border-bottom: none; }
  .modal-body .field-row .lbl {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .modal-body .field-row .val { color: var(--ink); font-style: italic; }
  .tap-hint {
    text-align: center;
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
    margin: 8px 0 14px;
    letter-spacing: 0.05em;
  }
  .tap-hint::before { content: '\261D '; opacity: 0.7; }

/* ---- Manifest 22 Oracle integration ---- */
/* ===== Manifest 22 Oracle block (scoped to .mw-tarot) ===== */
.mw-tarot{margin:56px auto 10px;max-width:600px;text-align:center;padding-top:34px;border-top:1px solid rgba(181,135,74,.30);font-family:'Cormorant Garamond',Georgia,serif;color:#f3ece0;}
.mw-trule{color:#b5874a;font-size:17px;letter-spacing:.4em;margin-bottom:14px;}
.mw-teyebrow{font-family:'Jost',sans-serif;font-weight:400;letter-spacing:.42em;text-transform:uppercase;font-size:11px;color:#b5874a;padding-left:.42em;}
.mw-ttitle{font-weight:500;font-size:31px;color:#f3ece0;margin:6px 0 6px;letter-spacing:.02em;}
.mw-seed{font-style:italic;color:#c9bda6;font-size:16px;margin:0 auto 4px;max-width:440px;line-height:1.5;}
.mw-seed em{color:#d9b87e;font-style:italic;}
.mw-ttabs{display:flex;justify-content:center;gap:8px;margin:22px 0 6px;}
.mw-ttab{font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;background:none;border:1px solid rgba(181,135,74,.32);color:#b7ac98;padding:10px 20px;border-radius:30px;cursor:pointer;transition:.2s;}
.mw-ttab.active{color:#0a0807;background:linear-gradient(180deg,#d9b87e,#b5874a);border-color:transparent;}
.mw-tstage{display:flex;justify-content:center;margin:18px 0 0;}
.mw-tback{width:min(64%,250px);aspect-ratio:1025/1001;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 1px rgba(181,135,74,.22);transition:transform .2s;}
.mw-tback:hover{transform:translateY(-3px);}
.mw-tback img{width:100%;height:100%;object-fit:cover;display:block;}
.mw-tback.noimg{background:radial-gradient(circle at 50% 35%,#1a140c,#0a0807);display:flex;align-items:center;justify-content:center;}
.mw-tback.noimg::after{content:"\2756";color:#b5874a;font-size:40px;}
.mw-tdraw{margin-top:24px;font-family:'Jost',sans-serif;letter-spacing:.26em;text-transform:uppercase;font-size:13px;color:#0a0807;background:linear-gradient(180deg,#d9b87e,#b5874a);border:none;padding:15px 36px;border-radius:40px;cursor:pointer;box-shadow:0 8px 26px rgba(181,135,74,.32);transition:transform .2s;}
.mw-tdraw:hover{transform:translateY(-2px);}
.mw-tout{opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s ease;margin-top:8px;}
.mw-tout.show{opacity:1;transform:none;}
.mw-tcard{max-width:540px;margin:26px auto 0;}
.mw-tart{width:min(60%,230px);aspect-ratio:1025/1001;margin:0 auto 18px;border-radius:12px;overflow:hidden;border:1px solid rgba(181,135,74,.22);background:#0c0a08;}
.mw-tart img{width:100%;height:100%;object-fit:cover;display:block;}
.mw-tart.noimg{display:flex;align-items:center;justify-content:center;}
.mw-tart.noimg::after{content:attr(data-n);color:#b5874a;font-size:34px;font-family:'Cormorant Garamond',serif;}
.mw-tnum{display:block;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.4em;color:#b5874a;text-transform:uppercase;margin-bottom:3px;padding-left:.4em;}
.mw-tname{font-size:30px;font-weight:500;margin:0;letter-spacing:.02em;color:#f3ece0;}
.mw-tverdict{margin:16px 0 4px;}
.mw-tverdict .lbl{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#b7ac98;display:block;margin-bottom:2px;padding-left:.4em;}
.mw-tverdict .val{font-size:40px;font-weight:600;letter-spacing:.04em;line-height:1;display:block;}
.mw-tverdict.YES .val{color:#d9b87e;} .mw-tverdict.NO .val{color:#c07a52;} .mw-tverdict.MAYBE .val{color:#cfc6a6;}
.mw-tverdict .note{display:block;font-style:italic;color:#b7ac98;font-size:16px;margin-top:6px;}
.mw-tkeys{display:flex;flex-wrap:wrap;gap:8px 10px;justify-content:center;margin:16px 0 4px;}
.mw-tkeys span{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#d9b87e;border:1px solid rgba(181,135,74,.3);padding:5px 11px;border-radius:30px;}
.mw-tdiv{color:rgba(181,135,74,.6);margin:20px 0 14px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-family:'Jost',sans-serif;}
.mw-tmeaning{font-size:19px;line-height:1.72;color:#f3ece0;text-align:left;}
.mw-tprompt{margin-top:20px;padding:15px 18px;border-left:2px solid rgba(181,135,74,.55);background:rgba(181,135,74,.06);font-style:italic;color:#d8cdb8;text-align:left;}
.mw-tprompt b{font-style:normal;font-family:'Jost',sans-serif;font-weight:400;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#b5874a;display:block;margin-bottom:6px;}
.mw-spos{margin-top:30px;padding-top:22px;border-top:1px solid rgba(181,135,74,.18);}
.mw-spos:first-child{border-top:none;margin-top:0;padding-top:0;}
.mw-poslbl{display:block;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#b5874a;margin-bottom:8px;}
@media (max-width:520px){ .mw-ttitle{font-size:27px;} .mw-tmeaning{font-size:18px;} }

<body>
  <div class="container">
    <header class="masthead" style="display:none;">
      <div class="ornament">&#10070; &#10086; &#10070;</div>
      <h1>Mami Wata's Mirror</h1>
      <p class="tagline">See yourself clearly.</p>
    </header>

    <div id="engine-status" class="engine-status">Mami Wata's Mirror &hellip;</div>
    <div id="saved-banner" class="saved-banner hidden">Welcome back &mdash; your last chart has been restored.</div>

    <div class="form-card">
      <div class="form-section first">
        <label>Chart Type</label>
        <select id="chart-type">
          <option value="natal">Western Natal Chart</option>
          <option value="transit">Transit Chart (current planets)</option>
          <option value="synastry">Synastry / Compatibility</option>
          <option value="human-design">Human Design Bodygraph</option>
          <option value="astrocartography">Astrocartography (world map)</option>
        </select>
      </div>

      <div class="form-section" id="primary-section">
        <h3>Birth Information</h3>
        <label>Name (optional)</label>
        <input type="text" id="person-name" placeholder="Your name" autocomplete="off">
        <div class="row">
          <div>
            <label>Birth Date</label>
            <input type="date" id="birth-date" required>
          </div>
          <div>
            <label>Birth Time</label>
            <input type="time" id="birth-time" required>
            <div class="helper">If unknown, use 12:00 (noon)</div>
          </div>
        </div>
        <label>Birth Location</label>
        <input type="text" id="location-search" placeholder="City, Country" autocomplete="off">
        <div id="location-results"></div>
        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">
        <div id="selected-location" class="selected-loc"></div>
        <label>House System</label>
        <select id="house-system">
          <option value="placidus">Placidus</option>
          <option value="whole-sign">Whole Sign</option>
        </select>
      </div>

      <div class="form-section hidden" id="transit-section">
        <h3>Transit Date</h3>
        <div class="row">
          <div>
            <label>Transit Date</label>
            <input type="date" id="transit-date">
            <div class="helper">Default: today</div>
          </div>
          <div>
            <label>Transit Time</label>
            <input type="time" id="transit-time" value="12:00">
          </div>
        </div>
        <label>Transit Location (where you are now)</label>
        <input type="text" id="transit-location-search" placeholder="City, Country" autocomplete="off">
        <div id="transit-location-results"></div>
        <input type="hidden" id="transit-latitude">
        <input type="hidden" id="transit-longitude">
        <div id="transit-selected-location" class="selected-loc"></div>
      </div>

      <div class="form-section hidden" id="synastry-section">
        <h3>Partner's Birth Information</h3>
        <label>Partner's Name (optional)</label>
        <input type="text" id="person-name-2" placeholder="Partner's name" autocomplete="off">
        <div class="row">
          <div>
            <label>Birth Date</label>
            <input type="date" id="birth-date-2">
          </div>
          <div>
            <label>Birth Time</label>
            <input type="time" id="birth-time-2">
          </div>
        </div>
        <label>Birth Location</label>
        <input type="text" id="location-search-2" placeholder="City, Country" autocomplete="off">
        <div id="location-results-2"></div>
        <input type="hidden" id="latitude-2">
        <input type="hidden" id="longitude-2">
        <div id="selected-location-2" class="selected-loc"></div>
      </div>

      <button id="generate-btn" class="primary" disabled>Generate Chart</button>
      <button id="clear-btn" class="clear-link">clear saved data and start over</button>
    </div>

    <div id="result"></div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-eyebrow" id="modal-eyebrow"></div>
      <h3 class="modal-title" id="modal-title"></h3>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="modal-divider">&#10070; &#10086; &#10070;</div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

<script type="module">
import SwissEph from 'https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js';

var INTERP_SIGNS = {
  Aries: { element: "Fire", modality: "Cardinal", ruler: "Mars", text: "The first spark. Aries is initiation, will, and the courage to begin without knowing what comes next. It rules the head and acts on instinct, leading from the front. Strengths: courage, directness, vitality, pioneering drive. Shadows: impulsiveness, impatience, anger, acting before thinking. Aries energy wants to start things, not finish them." },
  Taurus: { element: "Earth", modality: "Fixed", ruler: "Venus", text: "The fertile field. Taurus is rootedness, sensual pleasure, value, and the slow accumulation of what lasts. It rules the senses and finds meaning through what can be touched, tasted, and held. Strengths: steadiness, loyalty, patience, embodied presence. Shadows: stubbornness, possessiveness, resistance to change, materialism. Taurus needs comfort and security to flourish." },
  Gemini: { element: "Air", modality: "Mutable", ruler: "Mercury", text: "The messenger. Gemini is curiosity, language, connection, and the play of ideas. It thrives on variety, conversation, and the cross-pollination of perspectives. Strengths: wit, adaptability, intelligence, social fluency. Shadows: scattered focus, superficiality, restlessness, indecision. Gemini learns by talking and changes its mind as new information arrives." },
  Cancer: { element: "Water", modality: "Cardinal", ruler: "Moon", text: "The home and the womb. Cancer is feeling, memory, ancestry, and the protective shell. It rules emotional security, family, and the inner world. Strengths: empathy, nurturing, intuition, deep loyalty to chosen kin. Shadows: moodiness, clinginess, defensiveness, holding old wounds. Cancer needs a sense of safety to open up." },
  Leo: { element: "Fire", modality: "Fixed", ruler: "Sun", text: "The sovereign heart. Leo is creative self-expression, dignity, and the radiance of personality. It rules play, performance, romance, and what brings joy for its own sake. Strengths: warmth, generosity, leadership, creative confidence. Shadows: pride, vanity, need for approval, dramatic excess. Leo wants to be seen as itself, fully." },
  Virgo: { element: "Earth", modality: "Mutable", ruler: "Mercury", text: "The discerning servant. Virgo is craft, refinement, useful work, and the love of a thing done well. It rules health, daily routines, and the small precise improvements that compound. Strengths: precision, devotion, intelligence, practical skill. Shadows: criticism, perfectionism, anxiety, self-deprecation. Virgo serves through mastery." },
  Libra: { element: "Air", modality: "Cardinal", ruler: "Venus", text: "The scales. Libra is relationship, beauty, fairness, and the art of meeting another as equal. It rules partnership, aesthetics, diplomacy, and the search for harmony. Strengths: charm, fairness, refinement, the gift of mediation. Shadows: indecision, people-pleasing, conflict avoidance, vanity. Libra finds itself in the mirror of the other." },
  Scorpio: { element: "Water", modality: "Fixed", ruler: "Pluto / Mars", text: "The depths. Scorpio is intimacy, transformation, power, and what lies beneath the surface. It rules sex, death, shared resources, and the secrets that change us. Strengths: depth, loyalty, perception, regenerative power. Shadows: jealousy, control, suspicion, vengefulness. Scorpio doesn't do shallow." },
  Sagittarius: { element: "Fire", modality: "Mutable", ruler: "Jupiter", text: "The arrow. Sagittarius is meaning, truth-seeking, expansion, and the horizon line. It rules philosophy, travel, higher learning, and the quest for the bigger picture. Strengths: optimism, vision, faith, freedom-loving honesty. Shadows: tactlessness, restlessness, dogmatism, overpromising. Sagittarius is always en route somewhere." },
  Capricorn: { element: "Earth", modality: "Cardinal", ruler: "Saturn", text: "The mountain. Capricorn is mastery, structure, achievement, and the long climb. It rules career, public legacy, and the discipline that turns time into accomplishment. Strengths: ambition, integrity, endurance, executive capacity. Shadows: coldness, workaholism, status anxiety, emotional reserve. Capricorn ages backward, getting freer over time." },
  Aquarius: { element: "Air", modality: "Fixed", ruler: "Uranus / Saturn", text: "The water-bearer. Aquarius is the future, the collective, the outsider's view, and the systems that connect us. It rules friendships, communities, technology, and the genius of what's coming next. Strengths: originality, vision, humanitarianism, intellectual independence. Shadows: detachment, contrarianism, rigidity around ideas, emotional aloofness. Aquarius belongs to everyone and no one." },
  Pisces: { element: "Water", modality: "Mutable", ruler: "Neptune / Jupiter", text: "The ocean. Pisces is dissolution, mysticism, compassion, and the unity beneath the appearance of separateness. It rules dreams, art, the unconscious, and what cannot be measured. Strengths: empathy, imagination, spiritual sensitivity, surrender. Shadows: escapism, victimhood, boundary loss, addiction. Pisces feels what others won't." }
};

var INTERP_PLANETS = {
  Sun: { text: "Your Sun is your essential self, the conscious identity you grow into. It is what you radiate, the energy that animates everything else in the chart, and the principle of your becoming. The Sun's sign shows the style of selfhood you are here to embody; its house shows the area of life where that selfhood is forged. To live your Sun is to be most fully yourself." },
  Moon: { text: "Your Moon is your emotional body, your nervous system, the inner child and the inner mother. It rules what you need to feel safe, how you respond before thought, and the rhythms of your private life. The Moon's sign shows how you process feeling; its house shows where your emotional life is most active. Tending the Moon is self-care at the deepest level." },
  Mercury: { text: "Mercury is your mind in motion: how you think, learn, speak, listen, and connect ideas. It rules the messages you send and receive, your style of conversation, and the way you make sense of the world. Mercury's sign colors your thought patterns; its house shows where you most love to think and communicate." },
  Venus: { text: "Venus is your capacity for love, pleasure, and beauty. It rules your values, what you find attractive, how you relate, and what brings you joy for its own sake. Venus's sign shows your love language and aesthetic; its house shows where you seek harmony and where pleasure lives in your life." },
  Mars: { text: "Mars is your drive, desire, and the warrior in you. It rules anger, sex, ambition, and the courage to pursue what you want. Mars's sign shows how you fight and chase; its house shows where you most need to assert yourself. A well-lived Mars is healthy aggression in service of your Sun." },
  Jupiter: { text: "Jupiter is expansion, faith, meaning, and grace. It rules your philosophy of life, what you believe is possible, and the areas where opportunity tends to find you. Jupiter's sign shows the flavor of your optimism; its house shows where you grow, teach, and receive abundance." },
  Saturn: { text: "Saturn is structure, time, mastery, and limitation. It rules your responsibilities, your fears, and the areas where you must build slowly through discipline. Saturn's sign shows the lessons you came to learn; its house shows where life will hand you the long climb. Mastered Saturn becomes authority." },
  Uranus: { text: "Uranus is awakening, disruption, originality, and the future. It rules sudden change, genius, rebellion, and the lightning bolt that breaks open what has gone stale. Uranus's sign and house show where you are here to innovate, electrify, and refuse convention." },
  Neptune: { text: "Neptune is dissolution, dream, mysticism, and longing. It rules imagination, spiritual life, art, illusion, and the places you escape or transcend. Neptune's sign and house show where you experience union with the larger field, and where you must be careful of confusion or self-deception." },
  Pluto: { text: "Pluto is power, death, rebirth, and the underworld. It rules transformation that strips you to the bone, what is shared in intimacy, and the slow regeneration of self over years. Pluto's sign describes a generation; its house shows where you personally are remade." },
  Chiron: { text: "Chiron is the wound that becomes the gift. It marks where you carry an old hurt that cannot be fully healed yet teaches profound compassion and skill. Chiron's sign shows the texture of the wound; its house shows where it lives in your life, and where you eventually become a healer for others." },
  "North Node": { text: "Your North Node is your soul's growing edge in this lifetime, the direction of evolution. Its qualities feel unfamiliar and slightly uncomfortable, and yet leaning toward them brings the deepest meaning. The Node's sign shows what you are learning; its house shows the arena where the lesson plays out." },
  "South Node": { text: "Your South Node is what you bring with you, the gifts and patterns that come easily because you have done them many times. They feel like home but cannot grow you further. The South Node is what to release in service of the North Node, not deny but rebalance." },
  Lilith: { text: "Black Moon Lilith marks the place of your untamed feminine, your refusal to be domesticated, your sacred rage and exiled power. Her sign and house show where you have been told to make yourself smaller, and where reclaiming your own authority becomes liberation." },
  "Part of Fortune": { text: "The Part of Fortune is a calculated point where Sun, Moon, and Ascendant meet in harmony. It marks an area of natural ease, joy, and good fortune in your chart, the place where being yourself simply works. Its house shows where to plant for joy." },
  Vertex: { text: "The Vertex is sometimes called the point of fated encounter, the place where you meet what you did not choose and yet were always going to meet. It often activates through significant relationships and turning-point events that feel destined." }
};

var INTERP_HOUSES = {
  1: { name: "First House", domain: "Self & Identity", text: "The First House is the body you arrive in, the face you show the world, the way you walk into a room. It governs your physical appearance, your immediate manner, and the project of becoming yourself. Planets here are vivid and personal, coloring your whole presentation." },
  2: { name: "Second House", domain: "Resources & Values", text: "The Second House is what you own and what you are worth, both literally and inwardly. It governs money, possessions, talents, and the values you build your life on. Planets here shape your relationship to material life and to your own self-worth." },
  3: { name: "Third House", domain: "Mind & Communication", text: "The Third House is the local world: siblings, neighbors, daily errands, early education, the way you speak and listen. It governs the mind in motion and the network of close ties around you. Planets here color how you think and exchange." },
  4: { name: "Fourth House", domain: "Home & Roots", text: "The Fourth House is your foundation: home, family, lineage, the inner emotional life. It governs your roots, your sense of belonging, and the private self that lives behind closed doors. Planets here shape your soil." },
  5: { name: "Fifth House", domain: "Creativity & Joy", text: "The Fifth House is play, romance, children, creative expression, and what you do for delight. It governs the heart's overflow, the pleasure of making something for its own sake. Planets here show where joy and self-expression live." },
  6: { name: "Sixth House", domain: "Work & Health", text: "The Sixth House is daily life: work, health, routines, service, and the body's care. It governs the small habits that compound, the craft you devote yourself to, and the relationship between body and mind. Planets here show where the daily grind meets meaning." },
  7: { name: "Seventh House", domain: "Partnership & Relationship", text: "The Seventh House is the other: marriage, business partners, close adversaries, anyone who meets you face to face as equal. It governs your style of partnership and the qualities you draw to yourself in relationship. Planets here describe whom you meet across the table." },
  8: { name: "Eighth House", domain: "Intimacy & Transformation", text: "The Eighth House is the place of merging: deep intimacy, shared resources, sex, death, inheritance, and psychological transformation. It governs everything taboo and powerful that changes you at the root. Planets here are where you go down and come back different." },
  9: { name: "Ninth House", domain: "Meaning & Horizon", text: "The Ninth House is the search: higher education, philosophy, religion, foreign travel, the bigger picture. It governs what gives life meaning, the truth you keep reaching for, the horizons you cross. Planets here shape your worldview." },
  10: { name: "Tenth House", domain: "Career & Legacy", text: "The Tenth House is your public face: career, reputation, vocation, the contribution you make to the world. It governs authority, achievement, and what you are remembered for. Planets here are visible to others and shape your standing." },
  11: { name: "Eleventh House", domain: "Community & Vision", text: "The Eleventh House is the wider circle: friendships, groups, networks, hopes, ideals, and the future. It governs the people who walk alongside you and the visions you build toward together. Planets here shape your tribe." },
  12: { name: "Twelfth House", domain: "Soul & Hidden Realms", text: "The Twelfth House is the unseen: the unconscious, dreams, mysticism, retreat, what is hidden from view. It governs the soul's quiet life, places of confinement and transcendence, and the gifts that come from solitude. Planets here are deep waters." }
};

var INTERP_ASPECTS = {
  conjunction: { text: "Conjunction (0\u00B0): two energies fused. The planets work as one, blending their natures so completely they cannot be separated. Powerful, intensifying, sometimes blinding. Whatever the conjunction touches becomes a defining theme." },
  sextile: { text: "Sextile (60\u00B0): an opportunity. The planets harmonize easily but require some effort to activate. A talent that develops when you choose to use it. Gentle, creative, supportive flow." },
  square: { text: "Square (90\u00B0): tension that demands action. The two energies pull against each other and force you to grow. Squares are uncomfortable but productive, the friction that builds skill and character." },
  trine: { text: "Trine (120\u00B0): natural grace. The planets flow together effortlessly, a gift that comes without much striving. The shadow is taking it for granted; trines bless what they touch." },
  opposition: { text: "Opposition (180\u00B0): the mirror. The two energies sit across from each other and ask you to integrate them. Often projected onto other people first, oppositions teach balance through relationship." }
};

var INTERP_ASTRO_LINES = {
  MC: { text: "The Midheaven line is where this planet was directly overhead at your moment of birth. Living or traveling here amplifies the planet's themes in your career, public reputation, and the way the world sees you. It is the most visible expression of that planet's energy." },
  IC: { text: "The IC line is opposite the Midheaven, where this planet was directly beneath you at birth. Living or traveling here brings the planet's themes into your home life, foundations, family, and deepest inner work. It is the most private expression of that planet's energy." },
  ASC: { text: "The Ascendant line is where this planet was rising on the eastern horizon at your birth. Living or traveling here brings the planet's qualities into your personality, body, and the way you first show up to others. It is how you embody that planet." },
  DSC: { text: "The Descendant line is where this planet was setting on the western horizon at your birth. Living or traveling here brings the planet's themes into your relationships, partnerships, and how others meet you. It is what you attract and project." }
};

var INTERP_ASTRO_COMBOS = {

"Sun_MC": "Living, working, or even visiting near your Sun MC line amplifies your visibility, career, and public reputation in this place. Bosses, opportunities, and audiences find you here, and you may be drawn into leadership without seeking it. This is where the world reflects you back at full strength, which can be intoxicating and exposing in equal measure. The shadow is becoming the role rather than inhabiting it. Choose this line for chapters where you need to be seen for what you actually do, not chapters where you need to rest. Travel here when you want to be witnessed, when you want a project to land. Under this sun, you are not hidden. The mirror is held up wide enough for the whole sky to see you in it.",

"Sun_IC": "Near your Sun IC line, your private life, home, and inner sense of self come into focus, often more than your public role. Family dynamics intensify here, ancestral patterns surface, and the relationship to your father or to authority itself can be reworked. This is excellent territory for healing roots, raising children, building a home that feels like the marrow of who you are. The shadow is over-identifying with private life and disappearing from public view. Choose this line for chapters of rebuilding, of going deeper into self-knowledge. Travel here when you need to remember. This is the still pool, the night sea, the place where the soul sets down its lantern and looks at its own face.",

"Sun_ASC": "Living near your Sun ASC line makes you more vivid, more confident, more visibly yourself. People notice you, often before they know why, and physical vitality tends to run higher. This is a powerful line for reinvention, for stepping into a new chapter as a more fully-claimed version of yourself. The shadow is over-shining and burning out, or becoming so identified with how you appear that you lose track of how you feel. Choose this line when you need to be the protagonist of your own life, when you have been small for too long and it is time to take up space again. Here, the water you walk on does not part. It polishes. You will see yourself everywhere you go.",

"Sun_DSC": "Near your Sun DSC line, your closest relationships and partnerships take center stage, often defining the chapter of life you live here. Significant others appear here, business partners arrive, and you learn yourself through whom you choose to stand across from. This is rich territory for marriage, for collaborations, for the kind of love that teaches you who you are by showing you who you are not. The shadow is losing yourself in the other, mirroring instead of being. Choose this line for chapters where union is the lesson. Travel here when you want to be met. The mirror is held by someone else's hand on this line.",

"Moon_MC": "Your Moon MC line brings emotional life, intuition, and nurturing capacity into your public role here. Careers in care, hospitality, art, food, or anything that asks you to feel publicly flourish on this line. The general public tends to respond to you with warmth, and your reputation softens. The shadow is moodiness becoming public, or career success that drains you because every workday asks for emotional labor. Choose this line for chapters where being soft is the strength. Travel here when you want to be loved by strangers. Under this moon, the tide of your inner life becomes the rhythm of your work.",

"Moon_IC": "Your Moon IC line is one of the most deeply nurturing places on your map. Home here feels like home in the marrow, family becomes a real source of belonging, and the inner emotional life finds room to breathe and heal. This is exceptional territory for raising children, for tending grief, for living close to women, water, mothers, or ancestors. The shadow is regression. Choose this line for chapters of deep restoration, for healing the relationship to the feminine. Travel here when you need to be held. Here the womb is the world, and the world is your mother's lullaby. You can finally close your eyes.",

"Moon_ASC": "Near your Moon ASC line, your face, body, and immediate presence carry a noticeable softness, sensitivity, and emotional fluency. People feel comforted by you, share their feelings with you unprompted, and your intuition runs high. This is wonderful territory for healing work, for motherhood, for any role that asks you to receive other people fully. The shadow is absorbing others' emotions and losing the seal of your own skin. Choose this line for chapters where you want to be permeable on purpose. The moon walks at your side here. She lights everyone you meet, and they look at you the way one looks at calm water.",

"Moon_DSC": "Your Moon DSC line draws nurturing, emotionally fluent, or maternal partners into your life and shapes your relationships around feeling. You meet people here who soothe you, mother you, or whose emotional weather becomes intertwined with yours. Marriage and chosen family thrive on this line. The shadow is partners who are emotionally enmeshing. Choose this line for chapters where you want to be loved in a way that feels like coming home. Travel here when you are tired of being self-contained. Here the partner is also the tide. They come back, they come back, they come back. Let yourself be reached.",

"Mercury_MC": "Your Mercury MC line amplifies your voice, your writing, your teaching, and your capacity to be heard in your work. Careers in communication, education, publishing, media, or sales take off near this line. Your name circulates here. The shadow is overthinking the work, becoming a talking head, or letting your reputation outpace your actual depth. Choose this line for chapters where the message is the work, where you need to be quoted. Travel here when you have something to say. The Hermes of this line moves quickly. He has already delivered your name to all the right doorsteps before you arrived.",

"Mercury_IC": "Your Mercury IC line brings the life of the mind into your private world. Study, writing, reading, learning, and intimate conversation flourish at home here. This is exceptional territory for writers and scholars. The shadow is a noisy interior, insomnia, ruminating in private. Choose this line for chapters of writing the book, finishing the degree. Travel here when your mind needs to come home to itself. Here, the quiet is a teacher. Every walk you take is a sentence. The book is already being written, even when you are not at the desk.",

"Mercury_ASC": "Near your Mercury ASC line, you become noticeably quicker, wittier, more verbal, and more curious. People perceive you as clever and articulate before you have even spoken much. Networking, short trips, and learning languages come naturally on this line. The shadow is restlessness, scattered focus, talking more than listening. Choose this line for chapters where you need to think on your feet. Travel here when you have been silent too long. The wind is on your tongue on this line. Sentences arrive before you have planned them. Listen and let them through.",

"Mercury_DSC": "Your Mercury DSC line brings communicative, intellectual, witty partners into your life and shapes your relationships around conversation. You meet your best collaborators here. Long debates, shared reading, and minds that ignite each other characterize this line. The shadow is partners who talk a great game but do not follow through. Choose this line for chapters where you want to be partnered in thinking. Travel here when you need a witness with vocabulary. The other you meet here will be a mirror that talks back. Make sure you actually like what they say.",

"Venus_MC": "Your Venus MC line brings beauty, charm, and aesthetic intelligence into your public role. Careers in art, design, fashion, beauty, hospitality, or music bloom near this line. You attract benefactors and admirers, and your reputation acquires a glow. The shadow is being valued more for how you look than what you make. Choose this line for chapters when the work itself needs to be beautiful. Travel here when you want to be adored for what you create. Venus rises with you on this line. Every door you knock on is already half open, and the world has set the table with flowers.",

"Venus_IC": "Your Venus IC line is exquisite territory for home, for love that lives in private rooms, for a daily life made beautiful by your own hand. Romance, family harmony, and the cultivation of pleasure flourish on this line. The shadow is sliding into indulgence, choosing comfort over growth. Choose this line for chapters of love, of slow weekends. Travel here when you need to remember that pleasure is not optional. The bath is drawn here. The bed is made. The candle has been lit for you specifically. Stay as long as you like.",

"Venus_ASC": "Near your Venus ASC line, you become more attractive, physically, energetically, magnetically. People are drawn to you, find you charming, want to be in your light. This is one of the most beautiful lines on any map for romance. The shadow is over-reliance on charm, performing beauty. Choose this line for chapters when you have been invisible and want to be wanted. Travel here when you have forgotten what your reflection feels like. Venus walks with you on this line. She is not flattering you. She is reminding you of what you actually look like.",

"Venus_DSC": "Your Venus DSC line is the classical line of love, marriage, and beautiful partnership. You meet attractive, loving, harmonious partners here, and existing relationships often flower. Business and creative collaborations also thrive. The shadow is over-relying on the partner, choosing pretty over true. Choose this line for chapters when you are ready to be loved well and to love well in return. Travel here when you are tired of being alone. The other is already on their way. The light on this line makes everyone look like the person you needed.",

"Mars_MC": "Your Mars MC line amplifies your drive, ambition, and capacity for hard, decisive work in your career. You move faster here and take risks more readily. Careers in athletics, surgery, entrepreneurship, or activism spike on this line. The shadow is workaholism, public conflict, burnout. Choose this line for chapters when you need to fight for what you want. Travel here when you have been too patient. The red planet is at your shoulder on this line. You will move. You will not apologize for the speed.",

"Mars_IC": "Your Mars IC line brings energy, drive, and sometimes friction into home and family life. Renovations, building projects, or running a business from home flourish here. The shadow is family conflict, domestic anger, a home that becomes a battleground. Choose this line for chapters when you need to reclaim something at the root. Travel here when something deep in you needs to defend itself. Here, the fire is in the hearth. Tend it. The same flame that warms the room can burn the house down, depending on whose hand is on it.",

"Mars_ASC": "Near your Mars ASC line, you walk with more force, more athletic vitality, more directness. People perceive you as bold, sometimes intimidating. This is exceptional territory for athletes and for anyone needing to claim space. The shadow is appearing more aggressive than you feel, drawing conflict toward yourself. Choose this line for chapters when you have been told to make yourself smaller and you are finished with that. Mars stands behind you on this line. He is not a threat. He is your willingness to be the first one to move.",

"Mars_DSC": "Your Mars DSC line draws fiery, ambitious, sometimes combative partners into your life. Sex is strong here, attraction is fast, and partnerships have the heat of passion or argument. Worthy rivals also appear on this line. The shadow is partners who fight you or burn through you. Choose this line for chapters when you need a partner who can hold their own against you. Travel here when you want the kind of love that is also a sparring match. The other you meet here will not be soft. Their hardness, if you are lucky, will reveal yours.",

"Jupiter_MC": "Your Jupiter MC line is one of the luckiest lines on any map for career, reputation, and public success. Promotions land here, businesses scale, audiences grow. Careers in higher education, publishing, travel, religion, or law thrive on this line. The shadow is overpromising, growing too fast, believing your own press. Choose this line for chapters when you need to grow. Travel here when you have outgrown the room. Jupiter walks in front of you on this line, clearing the path. Walk with him. Do not run past him.",

"Jupiter_IC": "Your Jupiter IC line blesses home, family, and the foundations of your life with abundance, optimism, and meaning. Real estate often does well here, family expands. This is wonderful territory for raising children with a generous worldview. The shadow is over-extending, taking on more home than you can hold. Choose this line for chapters of building a real life, of buying the house. Travel here when you need to expand at the root. Here, the well is deep. Drink. Invite others to drink. It refills behind you.",

"Jupiter_ASC": "Near your Jupiter ASC line, you become more visibly confident, generous, optimistic, and luckier than you have any right to be. People perceive you as a teacher, a wise one. Travel, study, and faith all expand on this line. The shadow is overconfidence, indulgence, becoming preachy. Choose this line for chapters when you need to remember that the universe is friendly. Travel here when faith is required. Jupiter is the deity who throws the doors open. You will walk through them. You will not look back.",

"Jupiter_DSC": "Your Jupiter DSC line draws generous, wise, expansive partners into your life and blesses your closest relationships. Marriage often goes well here, business partnerships scale. Foreign partners, teachers, and mentors show up on this line. The shadow is partners who promise more than they deliver. Choose this line for chapters when you want a partner who is a teacher. Travel here when you are ready to be expanded by someone else's vision. The other you meet here will hand you a map of a country you did not know existed. Go.",

"Saturn_MC": "Your Saturn MC line builds career through discipline, time, and earned authority. Careers in government, law, structure, engineering, or executive leadership thrive here, and the reputation you build tends to last. The shadow is workaholism, isolation at the top, cold ambition. Choose this line for chapters when you are ready to take on real responsibility. Travel here when you have been adrift and need a structure. Saturn is the slow planet. He does not bless overnight. But what he hands you on this line, you will keep for the rest of your life.",

"Saturn_IC": "Your Saturn IC line is the most challenging line for home and family on the map, though it can also be profoundly stabilizing for the right chapter. You may build a serious home here or work through difficult ancestral material. The shadow is loneliness in the home, family burdens that feel heavy. Choose this line for chapters of doing the hard inner work. Travel here when you are ready to stop running from the past. Here, the foundations are stone. They were laid by people you may not have met. Touch them anyway. They are also yours.",

"Saturn_ASC": "Near your Saturn ASC line, you appear more serious, mature, authoritative, and disciplined. People perceive you as older or more weighted than you actually are. This is powerful territory for someone who has done the work. The shadow is feeling burdened, depression, being read as cold when you are simply contained. Choose this line for chapters when you need to be taken seriously. Travel here when childhood needs to end. Saturn shapes you on this line. He is the wave that wears the stone smooth, slow, persistent, and eventually beautiful.",

"Saturn_DSC": "Your Saturn DSC line draws older, more responsible, or more committed partners into your life. Long marriages often anchor here. The shadow is partners who feel like obligations, or commitments that outlast their warmth. Choose this line for chapters when you are ready for the partner who shows up, who keeps showing up. Travel here when you have been with too many people who do not stay. The other you meet here will be made of stone, in the best sense. They will outlast every storm. So will you, with them.",

"Uranus_MC": "Your Uranus MC line brings sudden change, innovation, and visibility through being unconventional in your career. Tech, science, activism, or alternative healing spikes on this line. Your reputation here is the reputation of someone unusual and ahead of the curve. The shadow is volatility, sudden public disruptions. Choose this line for chapters when you need to break the form you have been working inside. Travel here when you are ready to be electric. Uranus does not knock. He arrives. You will know him by the way the light flickers right before he speaks.",

"Uranus_IC": "Your Uranus IC line brings disruption, sudden change, and unconventionality into home and family life. You may live in unusual housing, with chosen family, or off-grid. The shadow is instability at the root, frequent moves. Choose this line for chapters when you need to break the old family pattern. Travel here when the old room is suffocating. Here, the walls move. The kitchen rearranges itself. That is not a haunting. That is your soul making the house finally yours.",

"Uranus_ASC": "Near your Uranus ASC line, you appear more eccentric, original, electric, and unmistakably yourself. People perceive you as unusual in a way that is magnetic. This is excellent territory for radical reinvention. The shadow is rebellion for its own sake, restlessness, instability in identity. Choose this line for chapters when conformity has cost you. Travel here when you are ready to stop apologizing. The lightning is in your hands on this line. Touch what needs to wake.",

"Uranus_DSC": "Your Uranus DSC line draws unusual, brilliant, freedom-loving partners into your life, and sometimes draws sudden ruptures in existing partnerships. Open relationships, long-distance loves, and partners from radically different backgrounds often happen on this line. The shadow is partners who cannot or will not stay. Choose this line for chapters when conventional relationship structures have failed you. Travel here when you want to be surprised. The other you meet here will not be the one you imagined. They will be the one you did not know you were free enough to want.",

"Neptune_MC": "Your Neptune MC line brings dreams, imagination, mysticism, and artistic vision into your public role. Careers in art, music, film, photography, spirituality, or healing flourish here. Your reputation acquires an ethereal quality. The shadow is glamour without substance, public confusion, scandal. Choose this line for chapters when the work is mystical. Travel here when you are tired of being literal. Here, the boundary between you and the work disappears. So does the boundary between you and the ocean. You will not drown. You will return with pearls.",

"Neptune_IC": "Your Neptune IC line is profoundly imaginative, spiritual, and dreamlike at the level of home and family. This is wonderful territory for meditation retreats or a private life soaked in art and mystery. The shadow is escapism, addiction, unclear family roles. Choose this line for chapters of mystical retreat. Travel here when you need to dissolve and re-form. Here, the house is on water. You will not always know what is real. Let that be okay. The dream is also teaching you.",

"Neptune_ASC": "Near your Neptune ASC line, you appear more ethereal, mystical, dreamy, artistic, and magnetic in a hard-to-pin-down way. People project onto you here. This is rich territory for artists, healers, and performers. The shadow is being misread, attracting confusion, slipping into dissociative states. Choose this line for chapters when you want to be a vessel. Travel here when you have forgotten the dream. Neptune is the sea god of this line. Step into the water. You will surface changed.",

"Neptune_DSC": "Your Neptune DSC line draws spiritual, artistic, dreamy, sometimes elusive partners into your life. Soulmate experiences and romantic idealization happen here. The shadow is illusion in love, partners who do not show up the way you imagined them. Choose this line for chapters when you want to be loved in a way that feels otherworldly. Travel here when ordinary love has bored you. The other you meet here will look exactly like the dream. Be sure they are also a person. Both can be true. Often, they are.",

"Pluto_MC": "Your Pluto MC line is the line of power, transformation, and reinvention at the level of public role. Careers in psychology, surgery, investigation, finance, or taboo subjects can rise dramatically here. The shadow is power struggles, public crises, being torn down to be rebuilt. Choose this line for chapters when you are ready to become someone you currently are not. Travel here when surface no longer satisfies you. Pluto rules the underworld. On this line, he hands you the keys. The kingdom is yours, but you will have to descend to claim it.",

"Pluto_IC": "Your Pluto IC line is one of the most intense lines for home and family on the map. Deep family healing and generational pattern-breaking happen here. The shadow is family power struggles, inherited trauma surfacing relentlessly. Choose this line for chapters when you are finally ready to face what you came from. Travel here when the work is real and you are ready. Here, the soil is rich because it composts the past. Plant what you want to feed your descendants. The dead will hold the roots steady.",

"Pluto_ASC": "Near your Pluto ASC line, you appear more powerful, magnetic, intense, and harder to ignore. People perceive you as formidable, and you tend to see through them in return. This is transformative territory for personal reinvention. The shadow is power struggles, attracting obsession, becoming controlling. Choose this line for chapters when you are ready to be reborn. Travel here when you have outlived yourself. Pluto stands in the doorway. He will ask you to leave something behind. Do it. The next version of you cannot fit through with that in your hands.",

"Pluto_DSC": "Your Pluto DSC line draws intense, transformative, sometimes possessive partners into your life. The relationships on this line are not casual. They are crucibles, soul-level encounters. The shadow is power struggles, jealousy, control. Choose this line for chapters when surface love has stopped feeding you. Travel here when you are brave. The other you meet here will see all of you, including what you have hidden from yourself. Let them. The mirror they hold is dark, and the truth in it is the one that finally sets you free."

  "Manifestor": { strategy: "Inform Before Acting", text: "Manifestors are the initiators, roughly 9% of the population. You are designed to begin things, to spark movement that others then pick up and carry. Your energy is not sustained like a Generator's; it comes in bursts and then needs rest. Your core challenge is the impact of your actions on others. When you initiate without informing, you create chaos and resistance. When you inform first, you clear the way and people get out of the path. Your signature is peace. Your not-self is anger." },
  "Generator": { strategy: "Wait to Respond", text: "Generators are the life-force builders, roughly 37% of the population. You have a defined Sacral Center, a sustainable engine that powers you when you are doing work that lights you up. You are not designed to initiate from the mind; you are designed to respond to what life puts in front of you. The body knows before the mind does, through gut sounds and yes/no signals. When you respond from the Sacral, you build mastery and satisfaction. When you push or initiate from the mind, you burn out and grow frustrated. Your signature is satisfaction. Your not-self is frustration." },
  "Manifesting Generator": { strategy: "Wait to Respond, then Inform", text: "Manifesting Generators are the multi-passionate ones, roughly 33% of the population. You combine the Generator's sustainable life-force with the Manifestor's capacity to initiate. You are fast, skip steps that others need, and often work on several things at once. Your strategy is to wait for a response from the Sacral, then inform those who will be affected before you act. Your shortcuts are a gift, not a flaw. Your signature is satisfaction and peace. Your not-self is frustration and anger." },
  "Projector": { strategy: "Wait for the Invitation", text: "Projectors are the guides, roughly 20% of the population. You see others clearly, often more clearly than they see themselves, and your gift is to recognize and direct energy. You do not have sustainable energy of your own; you are designed to manage and guide the energy of others. You must be invited into the big things, career, relationship, residence, because invitation gives you the energetic permission to engage fully. Without invitation, your wisdom is rejected and you grow bitter. With it, you are deeply successful. Your signature is success. Your not-self is bitterness." },
  "Reflector": { strategy: "Wait a Lunar Cycle", text: "Reflectors are the rare mirrors of the collective, roughly 1% of the population. You have no defined centers and you sample the energy of everyone around you, reflecting the health of your community back to it. You are designed to wait a full lunar cycle, about 28 days, before making major decisions, because you need to feel the choice through every transit of the moon. Your environment matters more for you than for any other type. Your signature is surprise and delight. Your not-self is disappointment." }

  "Sacral": { text: "Your truth comes through the gut response, the uh-huh and uh-uh that arises before thought. The Sacral knows immediately whether something has life-force in it for you. Listen to the sounds your body makes when asked yes/no questions. The mind will argue, but the body has already answered." },
  "Splenic": { text: "Your truth comes through a quiet, instantaneous knowing in the now. The Spleen speaks once, softly, and does not repeat itself. You must be present and listening. Splenic authority is intuition, the body's survival intelligence, and it is always about this moment, not the future." },
  "Ego (Heart)": { text: "Your truth comes through what your willpower wants. The Heart speaks through the language of will, commitment, and what you are willing to put your reputation behind. Ask yourself: do I want this for me? Will I follow through? Ego authority requires honesty about your own desire." },
  "Self-Projected (G Center)": { text: "Your truth comes through the sound of your own voice. You need to talk things out, often with a sounding board who simply listens, and hear what comes out of your mouth. The clarity is in the speaking, not in the thinking. Trust what you hear yourself say." },
  "Mental (Outer Authority)": { text: "As a Projector without inner authority, your clarity comes through talking with the right people in the right environments over time. You must be invited, you must speak with trusted others, and you must give it time. Your mind is for others, not for your own decisions; the answer arrives through the conversation, not the conclusion." },
  "Lunar": { text: "As a Reflector, your authority is the lunar cycle. You sample the energy of each transit over 28 days, and only then do you have the full picture. Major decisions must wait. You are designed to take your time, talk with many trusted people, and let clarity emerge through the moon's full passage." },

function norm360(x){x=x%360;return x<0?x+360:x;}
function splitDMS(lon){var n=norm360(lon),s=Math.floor(n/30),i=n-s*30,d=Math.floor(i),mF=(i-d)*60,m=Math.floor(mF),sec=Math.floor((mF-m)*60);return{sign:s,deg:d,min:m,sec:sec};}
function calcPlanet(jd,id,mosh){var f=(mosh?SEFLG_MOSEPH:SEFLG_SWIEPH)|SEFLG_SPEED;var r=swe.calc_ut(jd,id,f);return{longitude:r[0],speed:r[3]};}
function determineMoshier(jd){try{var t=swe.calc_ut(jd,SE_SUN,SEFLG_SWIEPH);if(!t||t.length<6||isNaN(t[0]))return true;return false;}catch(e){return true;}}

function isDayBirth(s,a){var d=norm360(s-a);return d>=180;}
function houseOfPlanet(lon,c){for(var i=0;i<12;i++){var s=c[i],e=c[(i+1)%12];if(s<=e){if(lon>=s&&lon<e)return i+1;}else{if(lon>=s||lon<e)return i+1;}}return null;}
function wholeSignHouses(a){var s=Math.floor(norm360(a)/30),c=new Array(12);for(var i=0;i<12;i++)c[i]=((s+i)%12)*30;return c;}
var ASPECTS=[{type:"conjunction",angle:0,orb:8},{type:"sextile",angle:60,orb:4},{type:"square",angle:90,orb:6},{type:"trine",angle:120,orb:6},{type:"opposition",angle:180,orb:6}];
function calcAspects(p){var r=[];for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var d=Math.abs(p[i].longitude-p[j].longitude);if(d>180)d=360-d;for(var k=0;k<ASPECTS.length;k++){var a=ASPECTS[k],o=Math.abs(d-a.angle);if(o<=a.orb){r.push({point1:p[i].name,point2:p[j].name,type:a.type,orb:o.toFixed(2)});break;}}}return r;}
function calcInterAspects(A,B){var r=[];for(var i=0;i<A.length;i++)for(var j=0;j<B.length;j++){var d=Math.abs(A[i].longitude-B[j].longitude);if(d>180)d=360-d;for(var k=0;k<ASPECTS.length;k++){var a=ASPECTS[k],o=Math.abs(d-a.angle);if(o<=a.orb){r.push({point1:A[i].name,point2:B[j].name,type:a.type,orb:o.toFixed(2)});break;}}}return r;}
function localToUT(y,m,d,h,mn,tz){var uH=(h+mn/60)-tz,uD=d,uM=m,uY=y;if(uH<0){uH+=24;uD-=1;if(uD<1){uM-=1;if(uM<1){uM=12;uY-=1;}uD=new Date(uY,uM,0).getDate();}}else if(uH>=24){uH-=24;uD+=1;var dim=new Date(uY,uM,0).getDate();if(uD>dim){uD=1;uM+=1;if(uM>12){uM=1;uY+=1;}}}return{y:uY,m:uM,d:uD,h:uH};}

function obliquity(jd){var T=(jd-2451545.0)/36525;return 23.43929111-0.0130041667*T-1.6388889e-7*T*T+5.0361111e-7*T*T*T;}
function eclToEqu(lon,lat,eps){var lonR=lon*Math.PI/180,latR=lat*Math.PI/180,epsR=eps*Math.PI/180;var sinDec=Math.sin(latR)*Math.cos(epsR)+Math.cos(latR)*Math.sin(epsR)*Math.sin(lonR);var dec=Math.asin(sinDec)*180/Math.PI;var y=Math.sin(lonR)*Math.cos(epsR)-Math.tan(latR)*Math.sin(epsR);var x=Math.cos(lonR);var ra=Math.atan2(y,x)*180/Math.PI;if(ra<0)ra+=360;return{ra:ra,dec:dec};}
function gmst(jd){var T=(jd-2451545.0)/36525;var g=280.46061837+360.98564736629*(jd-2451545.0)+0.000387933*T*T-T*T*T/38710000.0;return ((g%360)+360)%360;}
function generateAstrocartography(natal){
  var jd=natal.julianDay;
  var eps=obliquity(jd);
  var gmstDeg=gmst(jd);
  var planets=[
    {name:"Sun",symbol:"\u2609",color:"#f4d35e"},
    {name:"Moon",symbol:"\u263D",color:"#c8d6e5"},
    {name:"Mercury",symbol:"\u263F",color:"#a8e6cf"},
    {name:"Venus",symbol:"\u2640",color:"#ffaaa5"},
    {name:"Mars",symbol:"\u2642",color:"#ff6b6b"},
    {name:"Jupiter",symbol:"\u2643",color:"#ffd166"},
    {name:"Saturn",symbol:"\u2644",color:"#b8b09a"},
    {name:"Uranus",symbol:"\u2645",color:"#7cc3d4"},
    {name:"Neptune",symbol:"\u2646",color:"#6699cc"},
    {name:"Pluto",symbol:"\u2647",color:"#a06ec5"}
  ];
  var lines=[];
  planets.forEach(function(pl){
    var nat=natal.planets.filter(function(np){return np.name===pl.name;})[0];
    if(!nat)return;
    var eq=eclToEqu(nat.eclipticLongitude,0,eps);
    var mcLon=eq.ra-gmstDeg;
    while(mcLon>180)mcLon-=360;while(mcLon<-180)mcLon+=360;
    var icLon=mcLon+180;
    if(icLon>180)icLon-=360;
    var ascPoints=[],dscPoints=[];
    for(var phi=-80;phi<=80;phi+=2){
      var phiR=phi*Math.PI/180,decR=eq.dec*Math.PI/180;
      var cosH=-Math.tan(phiR)*Math.tan(decR);
      if(cosH<-1||cosH>1)continue;
      var H=Math.acos(cosH)*180/Math.PI;
      var lstAsc=eq.ra+H,lstDsc=eq.ra-H;
      var lonAsc=lstAsc-gmstDeg,lonDsc=lstDsc-gmstDeg;
      while(lonAsc>180)lonAsc-=360;while(lonAsc<-180)lonAsc+=360;
      while(lonDsc>180)lonDsc-=360;while(lonDsc<-180)lonDsc+=360;
      ascPoints.push({lat:phi,lon:lonAsc});
      dscPoints.push({lat:phi,lon:lonDsc});
    }
    lines.push({planet:pl.name,symbol:pl.symbol,color:pl.color,type:"MC",lon:mcLon});
    lines.push({planet:pl.name,symbol:pl.symbol,color:pl.color,type:"IC",lon:icLon});
    lines.push({planet:pl.name,symbol:pl.symbol,color:pl.color,type:"ASC",points:ascPoints});
    lines.push({planet:pl.name,symbol:pl.symbol,color:pl.color,type:"DSC",points:dscPoints});
  });
  return{type:"astrocartography",lines:lines,planets:planets};
}

function setupLocationSearch(iI,rI,laI,lnI,sI){
  var inp=document.getElementById(iI),res=document.getElementById(rI),laInp=document.getElementById(laI),lnInp=document.getElementById(lnI),sel=document.getElementById(sI),t;
  function tryGeocode(q){
    return fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=8&language=en&format=json")
      .then(function(r){return r.json();})
      .then(function(data){
        if(data&&data.results&&data.results.length){
          return data.results.map(function(r){
            var nm=r.name;
            if(r.admin1&&r.admin1!==r.name)nm+=", "+r.admin1;
            if(r.country)nm+=", "+r.country;
            return {lat:r.latitude,lon:r.longitude,name:nm};
          });
        }
        return fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=5")
          .then(function(r){return r.json();})
          .then(function(d2){
            if(!d2||!d2.length)return [];
            return d2.map(function(r){
              var p=r.display_name.split(",").map(function(s){return s.trim();}),cl=p[0];
              if(p.length>=2)cl+=", "+p[p.length-2];
              if(p.length>=3)cl+=", "+p[p.length-1];
              return {lat:parseFloat(r.lat),lon:parseFloat(r.lon),name:cl};
            });
          })
          .catch(function(){return [];});
      })
      .catch(function(){return [];});
  }
  inp.addEventListener("input",function(){
    clearTimeout(t);
    var q=inp.value.trim();
    if(q.length<2){res.innerHTML="";return;}
    t=setTimeout(function(){
      res.innerHTML='<div class="location-results"><div class="location-result" style="color:#888;font-style:italic;">Searching...</div></div>';
      tryGeocode(q).then(function(results){
        if(!results||!results.length){
          res.innerHTML='<div class="location-results"><div class="location-result" style="color:#c44536;font-style:italic;">No results. Try a bigger nearby city or check spelling.</div></div>';
          return;
        }
        var html='<div class="location-results">';
        results.forEach(function(r){
          html+='<div class="location-result" data-lat="'+r.lat+'" data-lon="'+r.lon+'" data-name="'+r.name.replace(/"/g,"&quot;")+'">'+r.name+'</div>';
        });
        html+='</div>';
        res.innerHTML=html;
        res.querySelectorAll(".location-result").forEach(function(n){
          if(!n.dataset.lat)return;
          n.addEventListener("click",function(){
            laInp.value=this.dataset.lat;
            lnInp.value=this.dataset.lon;
            inp.value=this.dataset.name;
            sel.textContent="\u2713 "+this.dataset.name;
            res.innerHTML="";
            saveState();
          });
        });
      });
    },350);
  });
}

      svg+='<g class="interactive" onclick="window._mami.showCenterInterp(\''+cn+'\','+(defined?'true':'false')+')"><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fl+'" stroke="#d4b675" stroke-width="1.5"/></g>';
    } else {

    }
    var labelColor=defined?"#0a0a0a":"#b8b09a";
    svg+='<text x="'+c.cx+'" y="'+c.cy+'" text-anchor="middle" dominant-baseline="central" fill="'+labelColor+'" font-size="10" font-family="Cinzel, serif" font-style="italic" pointer-events="none" letter-spacing="1">'+cn+'</text>';
  });
  Object.keys(BODYGRAPH_GATE_POSITIONS).forEach(function(gateStr){
    var g=parseInt(gateStr);
    var pos=BODYGRAPH_GATE_POSITIONS[g];
    var center=HD_GATE_CENTERS[g];

    if(activated){
