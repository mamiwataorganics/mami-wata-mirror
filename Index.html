<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mami Wata's Mirror</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #0a1028; color: #f0ead6; padding: 24px 16px 60px; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 32px; font-style: italic; text-align: center; margin-bottom: 8px; color: #e0c077; }
  .subtitle { text-align: center; color: #a8a08a; margin-bottom: 24px; font-style: italic; font-size: 15px; }
  .form-card { background: rgba(255,255,255,0.04); padding: 24px; border: 1px solid rgba(224,192,119,0.3); margin-bottom: 24px; }
  .form-section { border-top: 1px dashed rgba(224,192,119,0.2); padding-top: 18px; margin-top: 18px; }
  .form-section.first { border-top: none; padding-top: 0; margin-top: 0; }
  .form-section h3 { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #e0c077; margin-bottom: 12px; font-style: italic; }
  label { display: block; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #c9a961; margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input, select { width: 100%; padding: 10px 12px; font-size: 15px; background: rgba(0,0,0,0.3); color: #f0ead6; border: 1px solid rgba(240,234,214,0.2); font-family: Georgia, serif; }
  input:focus, select:focus { outline: none; border-color: #c9a961; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
  button { width: 100%; margin-top: 20px; padding: 14px; background: #c9a961; color: #0a1028; border: none; font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-family: Georgia, serif; }
  button:hover { background: #e0c077; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .helper { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }
  #result { margin-top: 32px; }
  .chart-wrapper { background: rgba(255,255,255,0.04); padding: 24px; border: 1px solid rgba(224,192,119,0.3); }
  .chart-wrapper h2 { font-size: 22px; font-style: italic; text-align: center; color: #e0c077; margin-bottom: 8px; }
  svg.wheel, svg.bodygraph { display: block; margin: 0 auto; max-width: 100%; height: auto; }
  .data-table { width: 100%; border-collapse: collapse; margin-top: 24px; font-size: 14px; }
  .data-table th { text-align: left; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #c9a961; padding: 8px; border-bottom: 1px solid rgba(240,234,214,0.2); }
  .data-table td { padding: 8px; border-bottom: 1px solid rgba(240,234,214,0.08); }
  .data-table .deg { color: #e0c077; font-weight: bold; }
  .section-title { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a961; margin: 28px 0 12px; }
  .error { background: rgba(196,69,54,0.15); border: 1px solid #c44536; padding: 14px; color: #f0ead6; margin-top: 16px; }
  .loading { text-align: center; color: #c9a961; padding: 24px; font-style: italic; }
  .location-results { background: rgba(0,0,0,0.5); border: 1px solid rgba(240,234,214,0.2); border-top: none; max-height: 200px; overflow-y: auto; }
  .location-result { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(240,234,214,0.05); font-size: 14px; }
  .location-result:hover { background: rgba(201,169,97,0.1); }
  .engine-status { text-align: center; font-size: 11px; color: #888; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .engine-status.ready { color: #6b8e4e; }
  .hd-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 20px 0; }
  .hd-summary-item { background: rgba(0,0,0,0.3); padding: 12px; text-align: center; border: 1px solid rgba(224,192,119,0.2); }
  .hd-summary-item .label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a961; margin-bottom: 4px; }
  .hd-summary-item .value { font-size: 16px; color: #e0c077; font-style: italic; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="container">
    <h1>Mami Wata's Mirror</h1>
    <p class="subtitle">Generate your chart with exact degrees</p>
    <div id="engine-status" class="engine-status">Loading Swiss Ephemeris engine...</div>
    <div class="form-card">
      <div class="form-section first">
        <label>Chart Type</label>
        <select id="chart-type">
          <option value="natal">Western Natal Chart</option>
          <option value="transit">Transit Chart (current planets)</option>
          <option value="synastry">Synastry / Compatibility</option>
          <option value="human-design">Human Design Bodygraph</option>
        </select>
      </div>
      <div class="form-section" id="primary-section">
        <h3 id="primary-heading">Birth Information</h3>
        <div class="row">
          <div><label>Birth Date</label><input type="date" id="birth-date" required></div>
          <div><label>Birth Time</label><input type="time" id="birth-time" required><div class="helper">If unknown, use 12:00 (noon)</div></div>
        </div>
        <label>Birth Location</label>
        <input type="text" id="location-search" placeholder="City, Country" autocomplete="off">
        <div id="location-results"></div>
        <input type="hidden" id="latitude"><input type="hidden" id="longitude">
        <div id="selected-location" class="helper" style="color:#e0c077;"></div>
        <label>House System</label>
        <select id="house-system"><option value="placidus">Placidus</option><option value="whole-sign">Whole Sign</option></select>
      </div>
      <div class="form-section hidden" id="transit-section">
        <h3>Transit Date</h3>
        <div class="row">
          <div><label>Transit Date</label><input type="date" id="transit-date"><div class="helper">Default: today</div></div>
          <div><label>Transit Time</label><input type="time" id="transit-time" value="12:00"></div>
        </div>
        <label>Transit Location (where you are now)</label>
        <input type="text" id="transit-location-search" placeholder="City, Country" autocomplete="off">
        <div id="transit-location-results"></div>
        <input type="hidden" id="transit-latitude"><input type="hidden" id="transit-longitude">
        <div id="transit-selected-location" class="helper" style="color:#e0c077;"></div>
      </div>
      <div class="form-section hidden" id="synastry-section">
        <h3>Partner's Birth Information</h3>
        <div class="row">
          <div><label>Birth Date</label><input type="date" id="birth-date-2"></div>
          <div><label>Birth Time</label><input type="time" id="birth-time-2"></div>
        </div>
        <label>Birth Location</label>
        <input type="text" id="location-search-2" placeholder="City, Country" autocomplete="off">
        <div id="location-results-2"></div>
        <input type="hidden" id="latitude-2"><input type="hidden" id="longitude-2">
        <div id="selected-location-2" class="helper" style="color:#e0c077;"></div>
      </div>
      <button id="generate-btn" disabled>Generate Chart</button>
    </div>
    <div id="result"></div>
  </div>
<script type="module">
import SwissEph from 'https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js';

var SIGN_NAMES = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
var SIGN_SYMBOLS = ["\u2648","\u2649","\u264A","\u264B","\u264C","\u264D","\u264E","\u264F","\u2650","\u2651","\u2652","\u2653"];
var SE_SUN=0,SE_MOON=1,SE_MERCURY=2,SE_VENUS=3,SE_MARS=4,SE_JUPITER=5,SE_SATURN=6,SE_URANUS=7,SE_NEPTUNE=8,SE_PLUTO=9,SE_MEAN_NODE=10,SE_MEAN_APOG=12,SE_CHIRON=15;
var SEFLG_SWIEPH=2,SEFLG_MOSEPH=4,SEFLG_SPEED=256;

var HD_GATE_ORDER = [25,17,21,51,42,3,27,24,2,23,8,20,16,35,45,12,15,52,39,53,62,56,31,33,7,4,29,59,40,64,47,6,46,18,48,57,32,50,28,44,1,43,14,34,9,5,26,11,10,58,38,54,61,60,41,19,13,49,30,55,37,63,22,36];
var HD_WHEEL_START = 358.125;
var HD_CENTER_GATES = {Head:[64,61,63],Ajna:[47,24,4,17,43,11],Throat:[62,23,56,16,20,31,8,33,35,12,45],G:[1,13,25,46,2,15,10,7],Heart:[21,40,26,51],Spleen:[48,57,44,50,32,28,18],Sacral:[34,5,14,29,59,9,3,42,27],Solar:[6,37,22,36,30,55,49],Root:[53,60,52,19,39,41,58,38,54]};
var HD_GATE_CENTERS = {};
Object.keys(HD_CENTER_GATES).forEach(function(c){HD_CENTER_GATES[c].forEach(function(g){HD_GATE_CENTERS[g]=c;});});
var HD_CHANNELS = [[1,8,"Inspiration"],[2,14,"The Beat"],[3,60,"Mutation"],[4,63,"Logic"],[5,15,"Rhythm"],[6,59,"Mating"],[7,31,"The Alpha"],[9,52,"Concentration"],[10,20,"Awakening"],[10,34,"Exploration"],[10,57,"Perfected Form"],[11,56,"Curiosity"],[12,22,"Openness"],[13,33,"The Prodigal"],[16,48,"Talent"],[17,62,"Acceptance"],[18,58,"Judgment"],[19,49,"Synthesis"],[20,34,"Charisma"],[20,57,"The Brain Wave"],[21,45,"Money"],[23,43,"Structuring"],[24,61,"Awareness"],[25,51,"Initiation"],[26,44,"Surrender"],[27,50,"Preservation"],[28,38,"Struggle"],[29,46,"Discovery"],[30,41,"Recognition"],[32,54,"Transformation"],[34,57,"Power"],[35,36,"Transitoriness"],[37,40,"Community"],[39,55,"Emoting"],[42,53,"Maturation"],[47,64,"Abstraction"]];

var swe=null,sweReady=false;
var statusEl=document.getElementById("engine-status");
var btn=document.getElementById("generate-btn");
(async function(){try{swe=new SwissEph();await swe.initSwissEph();sweReady=true;statusEl.textContent="\u2713 Engine ready";statusEl.classList.add("ready");btn.disabled=false;}catch(e){console.error(e);statusEl.textContent="\u26A0 Engine failed to load. Reload.";statusEl.style.color="#c44536";}})();

var chartTypeSelect=document.getElementById("chart-type");
chartTypeSelect.addEventListener("change",function(){
  var t=chartTypeSelect.value;
  document.getElementById("transit-section").classList.toggle("hidden",t!=="transit");
  document.getElementById("synastry-section").classList.toggle("hidden",t!=="synastry");
});

function norm360(x){x=x%360;return x<0?x+360:x;}
function splitDMS(lon){var n=norm360(lon),s=Math.floor(n/30),i=n-s*30,d=Math.floor(i),mF=(i-d)*60,m=Math.floor(mF),sec=Math.floor((mF-m)*60);return{sign:s,deg:d,min:m,sec:sec};}
function calcPlanet(jd,id,mosh){var f=(mosh?SEFLG_MOSEPH:SEFLG_SWIEPH)|SEFLG_SPEED;var r=swe.calc_ut(jd,id,f);return{longitude:r[0],speed:r[3]};}
function determineMoshier(jd){try{var t=swe.calc_ut(jd,SE_SUN,SEFLG_SWIEPH);if(!t||t.length<6||isNaN(t[0]))return true;return false;}catch(e){return true;}}
function partOfFortune(s,m,a,d){return d?norm360(a+m-s):norm360(a+s-m);}
function isDayBirth(s,a){var d=norm360(s-a);return d>=180;}
function houseOfPlanet(lon,c){for(var i=0;i<12;i++){var s=c[i],e=c[(i+1)%12];if(s<=e){if(lon>=s&&lon<e)return i+1;}else{if(lon>=s||lon<e)return i+1;}}return null;}
function wholeSignHouses(a){var s=Math.floor(norm360(a)/30),c=new Array(12);for(var i=0;i<12;i++)c[i]=((s+i)%12)*30;return c;}
var ASPECTS=[{type:"conjunction",angle:0,orb:8},{type:"sextile",angle:60,orb:4},{type:"square",angle:90,orb:6},{type:"trine",angle:120,orb:6},{type:"opposition",angle:180,orb:6}];
function calcAspects(p){var r=[];for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var d=Math.abs(p[i].longitude-p[j].longitude);if(d>180)d=360-d;for(var k=0;k<ASPECTS.length;k++){var a=ASPECTS[k],o=Math.abs(d-a.angle);if(o<=a.orb){r.push({point1:p[i].name,point2:p[j].name,type:a.type,orb:o.toFixed(2)});break;}}}return r;}
function calcInterAspects(A,B){var r=[];for(var i=0;i<A.length;i++)for(var j=0;j<B.length;j++){var d=Math.abs(A[i].longitude-B[j].longitude);if(d>180)d=360-d;for(var k=0;k<ASPECTS.length;k++){var a=ASPECTS[k],o=Math.abs(d-a.angle);if(o<=a.orb){r.push({point1:A[i].name,point2:B[j].name,type:a.type,orb:o.toFixed(2)});break;}}}return r;}
function localToUT(y,m,d,h,mn,tz){var uH=(h+mn/60)-tz,uD=d,uM=m,uY=y;if(uH<0){uH+=24;uD-=1;if(uD<1){uM-=1;if(uM<1){uM=12;uY-=1;}uD=new Date(uY,uM,0).getDate();}}else if(uH>=24){uH-=24;uD+=1;var dim=new Date(uY,uM,0).getDate();if(uD>dim){uD=1;uM+=1;if(uM>12){uM=1;uY+=1;}}}return{y:uY,m:uM,d:uD,h:uH};}
function longitudeToGate(lon){var rel=norm360(lon-HD_WHEEL_START),gs=360/64,gi=Math.floor(rel/gs),g=HD_GATE_ORDER[gi],wG=rel-gi*gs,l=Math.floor(wG/(gs/6))+1;if(l>6)l=6;if(l<1)l=1;return{gate:g,line:l};}

function calculatePlanetSet(jd,mosh){
  var sun=calcPlanet(jd,SE_SUN,mosh),moon=calcPlanet(jd,SE_MOON,mosh);
  var mer=calcPlanet(jd,SE_MERCURY,mosh),ven=calcPlanet(jd,SE_VENUS,mosh);
  var mar=calcPlanet(jd,SE_MARS,mosh),jup=calcPlanet(jd,SE_JUPITER,mosh);
  var sat=calcPlanet(jd,SE_SATURN,mosh),ura=calcPlanet(jd,SE_URANUS,mosh);
  var nep=calcPlanet(jd,SE_NEPTUNE,mosh),plu=calcPlanet(jd,SE_PLUTO,mosh);
  var nn=calcPlanet(jd,SE_MEAN_NODE,mosh),lil=calcPlanet(jd,SE_MEAN_APOG,mosh);
  var ch=0;try{var c=swe.calc_ut(jd,SE_CHIRON,mosh?SEFLG_MOSEPH:SEFLG_SWIEPH);if(c&&!isNaN(c[0]))ch=c[0];}catch(e){}
  return{sun:sun,moon:moon,mercury:mer,venus:ven,mars:mar,jupiter:jup,saturn:sat,uranus:ura,neptune:nep,pluto:plu,northNode:nn,lilith:lil,chironLon:ch};
}

function buildPlanetData(p,asc,mc,vx){
  var sn=norm360(p.northNode.longitude+180),iD=isDayBirth(p.sun.longitude,asc),fL=partOfFortune(p.sun.longitude,p.moon.longitude,asc,iD);
  return [
    {name:"Sun",symbol:"\u2609",longitude:p.sun.longitude,speed:p.sun.speed},
    {name:"Moon",symbol:"\u263D",longitude:p.moon.longitude,speed:p.moon.speed},
    {name:"Mercury",symbol:"\u263F",longitude:p.mercury.longitude,speed:p.mercury.speed},
    {name:"Venus",symbol:"\u2640",longitude:p.venus.longitude,speed:p.venus.speed},
    {name:"Mars",symbol:"\u2642",longitude:p.mars.longitude,speed:p.mars.speed},
    {name:"Jupiter",symbol:"\u2643",longitude:p.jupiter.longitude,speed:p.jupiter.speed},
    {name:"Saturn",symbol:"\u2644",longitude:p.saturn.longitude,speed:p.saturn.speed},
    {name:"Uranus",symbol:"\u2645",longitude:p.uranus.longitude,speed:p.uranus.speed},
    {name:"Neptune",symbol:"\u2646",longitude:p.neptune.longitude,speed:p.neptune.speed},
    {name:"Pluto",symbol:"\u2647",longitude:p.pluto.longitude,speed:p.pluto.speed},
    {name:"Chiron",symbol:"\u26B7",longitude:p.chironLon,speed:0},
    {name:"North Node",symbol:"\u260A",longitude:p.northNode.longitude,speed:0},
    {name:"South Node",symbol:"\u260B",longitude:sn,speed:0},
    {name:"Lilith",symbol:"\u26B8",longitude:p.lilith.longitude,speed:0},
    {name:"Part of Fortune",symbol:"\u2297",longitude:fL,speed:0},
    {name:"Vertex",symbol:"Vx",longitude:vx,speed:0}
  ];
}

function generateNatalChart(y,m,d,h,mn,la,ln,hs,tz){
  var ut=localToUT(y,m,d,h,mn,tz),jd=swe.julday(ut.y,ut.m,ut.d,ut.h),mosh=determineMoshier(jd);
  var p=calculatePlanetSet(jd,mosh);
  var hsys=hs==="whole-sign"?"W":"P",hr=swe.houses(jd,la,ln,hsys);
  var raw=hr.house||hr.cusps,cusps;
  if(raw&&raw.length>=12)cusps=raw.length===13?raw.slice(1,13):raw.slice(0,12);
  else throw new Error("House calculation failed");
  var am=hr.ascmc||hr.ascMc||[],asc=am[0],mc=am[1],vx=am[3];
  if(hs==="whole-sign")cusps=wholeSignHouses(asc);
  var pd=buildPlanetData(p,asc,mc,vx);
  var planets=pd.map(function(pl){var dms=splitDMS(pl.longitude);return{name:pl.name,symbol:pl.symbol,sign:SIGN_NAMES[dms.sign],signSymbol:SIGN_SYMBOLS[dms.sign],degreesInSign:dms.deg,minutes:dms.min,seconds:dms.sec,eclipticLongitude:pl.longitude,retrograde:pl.speed<0,house:houseOfPlanet(pl.longitude,cusps)};});
  var aD=splitDMS(asc),mD=splitDMS(mc);
  var houses=cusps.map(function(lon,i){var dms=splitDMS(lon);return{number:i+1,sign:SIGN_NAMES[dms.sign],signSymbol:SIGN_SYMBOLS[dms.sign],degreesInSign:dms.deg,minutes:dms.min,eclipticLongitude:lon};});
  var ap=pd.map(function(pl){return{name:pl.name,longitude:pl.longitude};});
  ap.push({name:"Ascendant",longitude:asc});ap.push({name:"Midheaven",longitude:mc});
  return{type:"natal",engine:mosh?"Moshier (built-in)":"Swiss Ephemeris",planets:planets,angles:{ascendant:{sign:SIGN_NAMES[aD.sign],signSymbol:SIGN_SYMBOLS[aD.sign],degreesInSign:aD.deg,minutes:aD.min,eclipticLongitude:asc},midheaven:{sign:SIGN_NAMES[mD.sign],signSymbol:SIGN_SYMBOLS[mD.sign],degreesInSign:mD.deg,minutes:mD.min,eclipticLongitude:mc}},houses:houses,aspects:calcAspects(ap)};
}

function generateTransitChart(nA,tA){
  var natal=generateNatalChart(nA.year,nA.month,nA.day,nA.hour,nA.minute,nA.lat,nA.lng,nA.houseSystem,nA.tzOffsetHours);
  var ut=localToUT(tA.year,tA.month,tA.day,tA.hour,tA.minute,tA.tzOffsetHours),jd=swe.julday(ut.y,ut.m,ut.d,ut.h),mosh=determineMoshier(jd);
  var p=calculatePlanetSet(jd,mosh);
  var pd=buildPlanetData(p,natal.angles.ascendant.eclipticLongitude,natal.angles.midheaven.eclipticLongitude,0);
  var tp=pd.map(function(pl){var dms=splitDMS(pl.longitude);return{name:pl.name,symbol:pl.symbol,sign:SIGN_NAMES[dms.sign],signSymbol:SIGN_SYMBOLS[dms.sign],degreesInSign:dms.deg,minutes:dms.min,seconds:dms.sec,eclipticLongitude:pl.longitude,retrograde:pl.speed<0,house:houseOfPlanet(pl.longitude,natal.houses.map(function(h){return h.eclipticLongitude;}))};});
  var nP=natal.planets.map(function(pl){return{name:"Natal "+pl.name,longitude:pl.eclipticLongitude};});
  var tP=pd.map(function(pl){return{name:"Transit "+pl.name,longitude:pl.longitude};});
  return{type:"transit",engine:natal.engine,natal:natal,transitPlanets:tp,transitDate:tA.year+"-"+String(tA.month).padStart(2,"0")+"-"+String(tA.day).padStart(2,"0"),interAspects:calcInterAspects(tP,nP)};
}

function generateSynastryChart(A,B){
  var nA=generateNatalChart(A.year,A.month,A.day,A.hour,A.minute,A.lat,A.lng,A.houseSystem,A.tzOffsetHours);
  var nB=generateNatalChart(B.year,B.month,B.day,B.hour,B.minute,B.lat,B.lng,B.houseSystem,B.tzOffsetHours);
  var pA=nA.planets.map(function(pl){return{name:"A: "+pl.name,longitude:pl.eclipticLongitude};});
  pA.push({name:"A: ASC",longitude:nA.angles.ascendant.eclipticLongitude});pA.push({name:"A: MC",longitude:nA.angles.midheaven.eclipticLongitude});
  var pB=nB.planets.map(function(pl){return{name:"B: "+pl.name,longitude:pl.eclipticLongitude};});
  pB.push({name:"B: ASC",longitude:nB.angles.ascendant.eclipticLongitude});pB.push({name:"B: MC",longitude:nB.angles.midheaven.eclipticLongitude});
  return{type:"synastry",engine:nA.engine,natalA:nA,natalB:nB,interAspects:calcInterAspects(pA,pB)};
}

function generateHumanDesignChart(y,m,d,h,mn,la,ln,tz){
  var ut=localToUT(y,m,d,h,mn,tz),jdP=swe.julday(ut.y,ut.m,ut.d,ut.h),mosh=determineMoshier(jdP);
  var pP=calculatePlanetSet(jdP,mosh);
  var tgt=norm360(pP.sun.longitude-88),jdD=jdP-88;
  for(var i=0;i<25;i++){var sg=calcPlanet(jdD,SE_SUN,mosh);var df=norm360(sg.longitude-tgt);if(df>180)df-=360;if(Math.abs(df)<0.0001)break;jdD-=df/0.9856;}
  var pD=calculatePlanetSet(jdD,mosh);

function getTimezoneOffset(y,m,d,la,ln){

}

function buildWheelSVG(planets,houses,ascLon,mcLon,aspects,opt){

  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="80" fill="none" stroke="#c9a961" stroke-width="0.5" opacity="0.4"/>';
  if(ascLon!==undefined){var aL=polar(cx,cy,298,eclToSvg(ascLon));svg+='<text x="'+aL.x+'" y="'+aL.y+'" text-anchor="middle" dominant-baseline="central" fill="#e0c077" font-size="10" letter-spacing="2">ASC</text>';}

  svg+='</svg>';return svg;

var CENTER_LAYOUT={Head:{x:160,y:30,w:80,h:70,shape:"triangle-up"},Ajna:{x:160,y:120,w:80,h:70,shape:"triangle-down"},Throat:{x:160,y:215,w:80,h:70,shape:"rect"},G:{x:160,y:315,w:80,h:80,shape:"diamond"},Heart:{x:255,y:330,w:60,h:60,shape:"triangle-left"},Spleen:{x:50,y:400,w:70,h:70,shape:"triangle-right"},Sacral:{x:160,y:435,w:80,h:80,shape:"rect"},Solar:{x:265,y:455,w:70,h:70,shape:"triangle-right"},Root:{x:160,y:550,w:80,h:80,shape:"rect"}};
var CENTER_COLORS={Head:"#f7d917",Ajna:"#5cb85c",Throat:"#8b6f47",G:"#e8c547",Heart:"#d9534f",Spleen:"#a06ec5",Sacral:"#d9534f",Solar:"#c9a961",Root:"#8b4f3f"};

function renderHumanDesign(d){
  var html='<div class="chart-wrapper"><h2>Human Design Bodygraph</h2><div style="text-align:center;font-size:11px;color:#888;margin-bottom:8px;font-style:italic;">'+d.engine+'</div><div class="hd-summary">';
  html+='<div class="hd-summary-item"><div class="label">Type</div><div class="value">'+d.hdType+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Strategy</div><div class="value">'+d.strategy+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Authority</div><div class="value">'+d.authority+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Profile</div><div class="value">'+d.profile+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Definition</div><div class="value">'+d.definition+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Signature</div><div class="value">'+d.signature+'</div></div>';
  html+='<div class="hd-summary-item"><div class="label">Not-Self</div><div class="value">'+d.notSelf+'</div></div></div>';
  var svg='<svg class="bodygraph" viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg">';
  Object.keys(CENTER_LAYOUT).forEach(function(cn){
    var c=CENTER_LAYOUT[cn],df=d.definedCenters[cn],fl=df?CENTER_COLORS[cn]:"transparent",st="#e0c077",sw=1.5,pts;
    if(c.shape==="triangle-up"){pts=c.x+","+(c.y+c.h)+" "+(c.x+c.w)+","+(c.y+c.h)+" "+(c.x+c.w/2)+","+c.y;svg+='<polygon points="'+pts+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    else if(c.shape==="triangle-down"){pts=c.x+","+c.y+" "+(c.x+c.w)+","+c.y+" "+(c.x+c.w/2)+","+(c.y+c.h);svg+='<polygon points="'+pts+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    else if(c.shape==="diamond"){pts=(c.x+c.w/2)+","+c.y+" "+(c.x+c.w)+","+(c.y+c.h/2)+" "+(c.x+c.w/2)+","+(c.y+c.h)+" "+c.x+","+(c.y+c.h/2);svg+='<polygon points="'+pts+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    else if(c.shape==="triangle-left"){pts=(c.x+c.w)+","+c.y+" "+(c.x+c.w)+","+(c.y+c.h)+" "+c.x+","+(c.y+c.h/2);svg+='<polygon points="'+pts+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    else if(c.shape==="triangle-right"){pts=c.x+","+c.y+" "+c.x+","+(c.y+c.h)+" "+(c.x+c.w)+","+(c.y+c.h/2);svg+='<polygon points="'+pts+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    else{svg+='<rect x="'+c.x+'" y="'+c.y+'" width="'+c.w+'" height="'+c.h+'" fill="'+fl+'" stroke="'+st+'" stroke-width="'+sw+'"/>';}
    svg+='<text x="'+(c.x+c.w/2)+'" y="'+(c.y+c.h/2)+'" text-anchor="middle" dominant-baseline="central" fill="'+(df?"#fff":"#888")+'" font-size="9" font-family="Georgia, serif" font-style="italic">'+cn+'</text>';
  });
  function gp(g){var c=HD_GATE_CENTERS[g];if(!c)return null;var lay=CENTER_LAYOUT[c];if(!lay)return null;return{x:lay.x+lay.w/2,y:lay.y+lay.h/2};}
  d.definedChannels.forEach(function(ch){var p1=gp(ch[0]),p2=gp(ch[1]);if(!p1||!p2)return;var bP=d.personalityGates[ch[0]]&&d.personalityGates[ch[1]],bD=d.designGates[ch[0]]&&d.designGates[ch[1]],lc=bD&&!bP?"#c44536":(bP&&!bD?"#0a1028":"#e0c077");svg+='<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="'+lc+'" stroke-width="3" opacity="0.85"/>';});
  // Show activated gate numbers as small labels around each center
  Object.keys(HD_CENTER_GATES).forEach(function(cn){var c=CENTER_LAYOUT[cn];HD_CENTER_GATES[cn].forEach(function(g,idx){if(!d.activatedGates[g])return;var bP=d.personalityGates[g],bD=d.designGates[g],col=bP&&bD?"#e0c077":(bD?"#c44536":"#fff");var col2=cn==="Head"||cn==="Ajna"||cn==="G"||cn==="Sacral"||cn==="Throat"||cn==="Root"?"#000":col;var px=c.x+5+(idx%4)*(c.w/4),py=c.y+c.h+10+Math.floor(idx/4)*10;svg+='<text x="'+px+'" y="'+py+'" fill="'+col+'" font-size="8" font-family="Georgia, serif">'+g+'</text>';});});
  svg+='</svg>';
  html+=svg;
  html+='<div class="section-title">Personality (Conscious) Activations</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.personalityPlanets.forEach(function(pl){var dms=splitDMS(pl.longitude);html+='<tr><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"'</td></tr>";});
  html+='</tbody></table><div class="section-title">Design (Unconscious) Activations</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.designPlanets.forEach(function(pl){var dms=splitDMS(pl.longitude);html+='<tr><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg" style="color:#c44536;">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"'</td></tr>";});
  html+='</tbody></table><div class="section-title">Defined Channels</div>';
  if(d.definedChannels.length===0){html+='<p style="color:#a8a08a;font-style:italic;">No defined channels.</p>';}
  else{html+='<table class="data-table"><thead><tr><th>Channel</th><th>Name</th><th>Centers</th></tr></thead><tbody>';d.definedChannels.forEach(function(c){html+='<tr><td>'+c[0]+'-'+c[1]+'</td><td>'+c[2]+'</td><td>'+HD_GATE_CENTERS[c[0]]+' \u2194 '+HD_GATE_CENTERS[c[1]]+'</td></tr>';});html+='</tbody></table>';}
  html+='<div class="section-title">Incarnation Cross</div><p style="color:#e0c077;font-style:italic;padding:8px 0;">'+d.incarnationCross+'</p></div>';
  resultDiv.innerHTML=html;
}
</script>
