    }else{
      bgFill=centerDefined?"rgba(0,0,0,0.15)":"transparent";
      textColor=centerDefined?"#3a3a3a":"#6b6451";
    }
    if(activated){
      svg+='<g class="interactive" onclick="window._mami.showGateInterp('+g+',null,null,\''+(bP&&bD?"Both Personality & Design":bP?"Personality (Conscious)":"Design (Unconscious)")+'\')"><circle cx="'+pos.x+'" cy="'+pos.y+'" r="9" fill="'+bgFill+'" stroke="#d4b675" stroke-width="0.8"/><text x="'+pos.x+'" y="'+pos.y+'" text-anchor="middle" dominant-baseline="central" fill="'+textColor+'" font-size="9" font-weight="bold" font-family="Cinzel, serif" pointer-events="none">'+g+'</text></g>';
    }else{
      svg+='<g class="interactive" onclick="window._mami.showGateInterp('+g+',null,null,\'Not activated\')"><circle cx="'+pos.x+'" cy="'+pos.y+'" r="8" fill="'+bgFill+'" stroke="rgba(212,182,117,0.3)" stroke-width="0.5"/><text x="'+pos.x+'" y="'+pos.y+'" text-anchor="middle" dominant-baseline="central" fill="'+textColor+'" font-size="8" font-family="Cinzel, serif" pointer-events="none" opacity="0.7">'+g+'</text></g>';
    }
  });
  svg+='</svg>';
  html+=svg;
  html+='<div class="legend" style="margin-top:8px;"><span class="swatch" style="background:#e9cb8a;"></span>Both &nbsp; <span class="swatch" style="background:#0a0a0a;border:1px solid #d4b675;"></span>Personality &nbsp; <span class="swatch" style="background:#c44536;"></span>Design</div>';
  html+='<div class="ornament-divider">\u2756 \u272A \u2756</div>';
  html+='<div class="section-title">Personality (Conscious) Activations</div><div class="tap-hint">Tap any gate to read its meaning</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.personalityPlanets.forEach(function(pl,i){var dms=splitDMS(pl.longitude);html+='<tr class="clickable" onclick="window._mami.showGateInterp('+pl.gate+','+pl.line+',\''+pl.name+'\',\'Personality (Conscious)\')"><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"\u2032</td></tr>";});
  html+='</tbody></table>';
  html+='<div class="section-title">Design (Unconscious) Activations</div><div class="tap-hint">Tap any gate to read its meaning</div><table class="data-table"><thead><tr><th>Body</th><th>Gate.Line</th><th>Position</th></tr></thead><tbody>';
  d.designPlanets.forEach(function(pl,i){var dms=splitDMS(pl.longitude);html+='<tr class="clickable" onclick="window._mami.showGateInterp('+pl.gate+','+pl.line+',\''+pl.name+'\',\'Design (Unconscious)\')"><td>'+pl.symbol+' '+pl.name+'</td><td><span class="deg" style="color:#c44536;">'+pl.gate+'.'+pl.line+'</span></td><td>'+SIGN_SYMBOLS[dms.sign]+' '+dms.deg+'\u00B0'+String(dms.min).padStart(2,"0")+"\u2032</td></tr>";});
  html+='</tbody></table>';
  html+='<div class="section-title">Defined Channels</div><div class="tap-hint">Tap any channel to read its meaning</div>';
  if(d.definedChannels.length===0){html+='<p style="color:#b8b09a;font-style:italic;text-align:center;padding:14px;">No defined channels.</p>';}else{html+='<table class="data-table"><thead><tr><th>Channel</th><th>Name</th><th>Centers</th></tr></thead><tbody>';d.definedChannels.forEach(function(c){html+='<tr class="clickable" onclick="window._mami.showChannelInterp('+c[0]+','+c[1]+')"><td><span class="deg">'+c[0]+'\u2014'+c[1]+'</span></td><td>'+c[2]+'</td><td>'+HD_GATE_CENTERS[c[0]]+' \u2194 '+HD_GATE_CENTERS[c[1]]+'</td></tr>';});html+='</tbody></table>';}
  html+='<div class="section-title">Centers</div><div class="tap-hint">Tap any center to read its meaning</div><table class="data-table"><thead><tr><th>Center</th><th>State</th></tr></thead><tbody>';
  Object.keys(BODYGRAPH_CENTERS).forEach(function(cn){var defined=d.definedCenters[cn];html+='<tr class="clickable" onclick="window._mami.showCenterInterp(\''+cn+'\','+(defined?'true':'false')+')"><td>'+cn+'</td><td>'+(defined?'<span style="color:#e9cb8a;">Defined</span>':'<span style="color:#b8b09a;">Open</span>')+'</td></tr>';});
  html+='</tbody></table>';
  html+='<div class="section-title">Incarnation Cross</div><p style="color:#e9cb8a;font-style:italic;text-align:center;padding:14px 0;font-size:17px;">'+d.incarnationCross+'</p>';
  html+='</div>';

}

function renderAstrocartography(d,natal){
  var W=900,H=480;
  var TOP=28,BOT=38;
  function lonToX(lon){return (lon+180)*W/360;}
  function latToY(lat){return TOP+(85-lat)*(H-TOP-BOT)/170;}

  function blobPath(pts){
    var path="M "+lonToX(pts[0][1])+" "+latToY(pts[0][0]);
    for(var i=1;i<pts.length;i++){path+=" L "+lonToX(pts[i][1])+" "+latToY(pts[i][0]);}
    path+=" Z";
    return path;
  }
  var BLOBS=[
    [[60,-130],[62,-110],[60,-90],[55,-75],[45,-65],[35,-70],[25,-80],[20,-100],[28,-115],[42,-125]],
    [[22,-100],[18,-92],[12,-85],[8,-78],[12,-82],[16,-88],[20,-95]],
    [[10,-75],[5,-55],[-5,-45],[-15,-40],[-25,-45],[-35,-55],[-45,-65],[-55,-70],[-45,-75],[-30,-72],[-15,-75],[0,-78]],
    [[75,-50],[78,-30],[72,-25],[65,-35],[68,-50]],
    [[60,-5],[62,10],[60,25],[55,35],[50,40],[42,25],[38,10],[42,0],[50,-8]],
    [[58,-8],[60,-2],[55,0],[50,-5],[52,-10]],
    [[35,-10],[38,10],[35,30],[25,40],[15,45],[0,42],[-15,35],[-30,25],[-35,18],[-30,12],[-15,10],[0,5],[15,-5],[28,-15]],
    [[-12,45],[-15,50],[-22,50],[-25,47],[-22,43],[-15,43]],
    [[70,30],[72,60],[70,90],[65,120],[60,140],[50,145],[40,140],[30,130],[25,110],[20,90],[15,75],[25,60],[30,45],[40,35],[55,30]],
    [[28,70],[25,78],[18,80],[10,78],[8,75],[15,70],[22,68]],
    [[10,95],[8,105],[5,115],[-5,120],[-8,130],[-2,125],[5,115],[10,105]],
    [[45,138],[42,145],[35,140],[32,132],[38,130],[43,132]],
    [[-12,130],[-15,145],[-25,155],[-35,150],[-38,140],[-35,125],[-25,115],[-15,120]]
  ];

  var CITIES=[
    ["New York",40.71,-74.01],
    ["Los Angeles",34.05,-118.24],
    ["Houston",29.76,-95.37],
    ["Toronto",43.65,-79.38],
    ["Miami",25.77,-80.19],
    ["Mexico City",19.43,-99.13],
    ["Sao Paulo",-23.55,-46.63],
    ["Buenos Aires",-34.6,-58.4],
    ["London",51.51,-0.13],
    ["Paris",48.86,2.35],
    ["Lagos",6.52,3.38],
    ["Cairo",30.04,31.24],
    ["Cape Town",-33.92,18.42],
    ["Mumbai",19.08,72.88],
    ["Tokyo",35.68,139.65],
    ["Sydney",-33.87,151.21],
    ["Honolulu",21.31,-157.86]
  ];

  var html='<div class="chart-wrapper"><h2>'+getName()+' Astrocartography</h2><div class="chart-meta">Planetary lines on the world map \u00B7 '+(natal.engine||'')+'</div>';
  html+='<p style="text-align:center;color:var(--ink-soft);font-style:italic;margin-bottom:16px;font-size:14px;">Each line shows where a planet\u2019s energy is strongest. Living, traveling, or working near these lines amplifies that planet\u2019s themes in your life.</p>';

  var svg='<svg class="astromap" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="background:#0a1326;border:1px solid rgba(232,225,204,0.2);">';
  svg+='<rect x="0" y="'+TOP+'" width="'+W+'" height="'+(H-TOP-BOT)+'" fill="#0d1830"/>';

  for(var glon=-150;glon<=150;glon+=30){
    svg+='<line x1="'+lonToX(glon)+'" y1="'+TOP+'" x2="'+lonToX(glon)+'" y2="'+(H-BOT)+'" stroke="rgba(232,225,204,0.05)" stroke-width="0.3"/>';
  }
  for(var glat=-60;glat<=60;glat+=30){
    svg+='<line x1="0" y1="'+latToY(glat)+'" x2="'+W+'" y2="'+latToY(glat)+'" stroke="rgba(232,225,204,0.05)" stroke-width="0.3"/>';
  }
  svg+='<line x1="0" y1="'+latToY(0)+'" x2="'+W+'" y2="'+latToY(0)+'" stroke="rgba(232,225,204,0.12)" stroke-width="0.5" stroke-dasharray="3,3"/>';

  BLOBS.forEach(function(b){
    svg+='<path d="'+blobPath(b)+'" fill="rgba(184,176,154,0.13)" stroke="rgba(232,225,204,0.3)" stroke-width="0.6"/>';
  });

  var mcTopGroups={},icBotGroups={};
  d.lines.forEach(function(line){
    var col=line.color;
    if(line.type==="MC"||line.type==="IC"){
      var x=lonToX(line.lon);
      var dash=line.type==="IC"?'stroke-dasharray="4,3"':'';
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><line x1="'+x+'" y1="'+TOP+'" x2="'+x+'" y2="'+(H-BOT)+'" stroke="'+col+'" stroke-width="1.4" opacity="0.9" '+dash+'/></g>';
      var bucket=Math.round(x/22);
      if(line.type==="MC"){
        if(!mcTopGroups[bucket])mcTopGroups[bucket]=[];
        mcTopGroups[bucket].push({x:x,symbol:line.symbol,color:line.color,planet:line.planet});
      }else{
        if(!icBotGroups[bucket])icBotGroups[bucket]=[];
        icBotGroups[bucket].push({x:x,symbol:line.symbol,color:line.color,planet:line.planet});
      }
    }else{
      if(!line.points||line.points.length<2)return;
      var dash=line.type==="DSC"?'stroke-dasharray="4,3"':'';
      var pts=line.points.slice().sort(function(a,b){return a.lat-b.lat;});
      var segments=[[]],lastLon=null;
      pts.forEach(function(p){
        if(lastLon!==null&&Math.abs(p.lon-lastLon)>180){segments.push([]);}
        segments[segments.length-1].push(p);
        lastLon=p.lon;
      });
      segments.forEach(function(seg){
        if(seg.length<2)return;
        var path='M ';
        seg.forEach(function(p,i){path+=(i?' L ':'')+lonToX(p.lon)+' '+latToY(p.lat);});
        svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="1.4" opacity="0.9" '+dash+'/></g>';
        if(seg.length>3){
          var mid=seg[Math.floor(seg.length/2)];
          var mx=lonToX(mid.lon),my=latToY(mid.lat);
          svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+line.planet+'\',\''+line.type+'\')"><circle cx="'+mx+'" cy="'+my+'" r="9" fill="#0a1326" stroke="'+col+'" stroke-width="0.8"/><text x="'+mx+'" y="'+my+'" text-anchor="middle" dominant-baseline="central" fill="'+col+'" font-size="10" font-weight="bold" font-family="Cinzel, serif">'+line.symbol+'</text></g>';
        }
      });
    }
  });

  Object.keys(mcTopGroups).forEach(function(b){
    var group=mcTopGroups[b];
    group.forEach(function(g,i){
      var staggerY=i%2===0?14:24;
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+g.planet+'\',\'MC\')"><text x="'+g.x+'" y="'+staggerY+'" text-anchor="middle" fill="'+g.color+'" font-size="13" font-family="Cinzel, serif" font-weight="bold">'+g.symbol+'</text></g>';
    });
  });

  Object.keys(icBotGroups).forEach(function(b){
    var group=icBotGroups[b];
    group.forEach(function(g,i){
      var staggerY=H-22-(i%2===0?0:10);
      svg+='<g class="interactive" onclick="window._mami.showAstroLineInterp(\''+g.planet+'\',\'IC\')"><text x="'+g.x+'" y="'+staggerY+'" text-anchor="middle" fill="'+g.color+'" font-size="13" font-family="Cinzel, serif" font-weight="bold" font-style="italic">'+g.symbol+'</text></g>';
    });
  });

  CITIES.forEach(function(c){
    var cx=lonToX(c[2]),cy=latToY(c[1]);
    svg+='<rect x="'+(cx+3)+'" y="'+(cy-5)+'" width="'+(c[0].length*6+4)+'" height="12" fill="rgba(10,19,38,0.85)" rx="2"/>';
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="#0a1326" stroke="#ffffff" stroke-width="1.5"/>';
    svg+='<text x="'+(cx+6)+'" y="'+(cy+4)+'" fill="#ffffff" font-size="10" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="500">'+c[0]+'</text>';
  });

  svg+='</svg>';
  html+=svg;

  html+='<p style="text-align:center;color:var(--ink-faint);font-style:italic;margin-top:10px;font-size:12px;">Planet symbols at the <strong style="color:var(--ink-soft);">top</strong> mark MC lines (solid, vertical). Symbols at the <strong style="color:var(--ink-soft);">bottom</strong> mark IC lines (dashed, vertical). Symbols <strong style="color:var(--ink-soft);">on curves</strong> mark ASC (solid) and DSC (dashed) lines.</p>';

  html+='<div class="section-title">Planet Lines</div><div class="tap-hint">Tap any line on the map or any cell below for its full reading</div>';
  html+='<table class="data-table"><thead><tr><th>Planet</th><th>MC</th><th>IC</th><th>ASC</th><th>DSC</th></tr></thead><tbody>';
  d.planets.forEach(function(pl){
    html+='<tr><td style="color:'+pl.color+';">'+pl.symbol+' '+pl.name+'</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'MC\')" style="cursor:pointer;">MC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'IC\')" style="cursor:pointer;">IC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'ASC\')" style="cursor:pointer;">ASC</td>';
    html+='<td class="clickable" onclick="window._mami.showAstroLineInterp(\''+pl.name+'\',\'DSC\')" style="cursor:pointer;">DSC</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  html+='<p style="text-align:center;color:var(--ink-faint);font-style:italic;margin-top:18px;font-size:13px;">Solid lines = MC and ASC. Dashed lines = IC and DSC.</p>';
  html+='</div>';
  resultDiv.innerHTML=html;
  mwTarot.mount("astrocartography",natal);
}

var MW_CARD_BASE = "https://manifest22-oracle.netlify.app/cards/";
var MW_DECK = [{"n":1,"slug":"awakening","key":"01-awakening","name":"The Awakening","keywords":["New consciousness","Beginnings","Stirring","Remembrance of self"],"verdict":"YES","note":"","meaning":"The Awakening marks the moment the soul stirs from sleep. Something long dormant is rising into the light of awareness, and you are being called to meet it consciously. This is the first breath of a new season, the crescent moon of a cycle just beginning. Whatever you have been waiting to understand is becoming clear. Do not rush the unfolding; awakenings arrive in their own timing, but the door has opened. Trust what is being revealed to you now, even if you can only see the first sliver of it.","planets":["Sun","Uranus"],"element":"fire"},
{"n":2,"slug":"mirror","key":"02-mirror","name":"The Mirror","keywords":["Reflection","Self-inquiry","Projection","The answer within"],"verdict":"MAYBE","note":"reflect, look at your part","meaning":"The Mirror returns your gaze to yourself. What you are seeking outside is a reflection of something within, and before you can move forward you are asked to look honestly at your own reflection. Whatever you feel about a person or situation is showing you something about your own inner state. This is not a moment to act outward but to study what is being mirrored back. The answer is not yet a clear yes, because the question is really about you. Examine your motives, your patterns, and your part in the story before you decide.","planets":["Moon","Neptune"],"element":"water"},
{"n":3,"slug":"tide","key":"03-tide","name":"The Tide","keywords":["Natural cycles","Rising flow","Timing","Emotional currents"],"verdict":"YES","note":"","meaning":"The Tide is turning in your favor. Like the moon pulling the ocean, unseen forces are moving on your behalf, and the water is rising toward you. This card speaks to the rhythm of things, the truth that life moves in swells and retreats and that you are now in an incoming season. Stop fighting the pull. What felt stuck is beginning to flow. Let yourself be carried by the rising tide rather than swimming against it. Timing is on your side, and the current is bringing something toward your shore.","planets":["Moon"],"element":"water"},
{"n":4,"slug":"offering","key":"04-offering","name":"The Offering","keywords":["Devotion","Reciprocity","Sacred giving","Surrender"],"verdict":"YES","note":"lead with generosity","meaning":"The Offering teaches that what you place on the altar returns to you transformed. You are being asked to give something, your time, your trust, your surrender, before you can receive. This is not loss but exchange, the sacred economy of giving and receiving. When you offer up your fear or your tight grip on an outcome, you make room for grace to answer. The smoke rises, the prayer is heard. Give freely and with an open heart, and watch how the universe meets your offering.","planets":["Venus"],"element":"water"},
{"n":5,"slug":"threshold","key":"05-threshold","name":"The Threshold","keywords":["Liminal space","Crossing over","Readiness","The doorway"],"verdict":"YES","note":"","meaning":"The Threshold is the sacred doorway between what was and what will be. You are standing at the edge of a new chapter, and the light beyond the door confirms you are ready to cross. Liminal spaces can feel uncertain because you have left the old room but not yet entered the new one. Trust that you were brought here for a reason. The threshold only appears to those prepared to walk through it. Step forward. What waits on the other side is meant for the version of you that you are becoming.","planets":["Saturn","Uranus"],"element":"air"},
{"n":6,"slug":"pearl","key":"06-pearl","name":"The Pearl","keywords":["Hidden value","Wisdom from friction","Slow treasure","Worth"],"verdict":"YES","note":"","meaning":"The Pearl is the treasure formed in the dark, the gift that grew slowly from what once irritated you. Every difficulty you have endured has been layering something precious within you, and now its value is being revealed. This card honors the long, quiet work that no one saw. What you have made of your struggle is rare and worthy. Do not undervalue what you carry. The answer is yes, and it comes wrapped in the reminder that your hardest seasons produced your greatest wealth. Open the shell and claim it.","planets":["Venus","Moon"],"element":"water"},
{"n":7,"slug":"current","key":"07-current","name":"The Current","keywords":["Flow","Surrender","Momentum","Being carried"],"verdict":"YES","note":"","meaning":"The Current invites you to release your grip and let the water move you. There is a flow already running beneath your circumstances, and your work now is not to force but to align with it. When you stop paddling against the stream, you discover how much momentum was already there. This card promises movement and ease if you surrender your need to control the route. Trust where the water is taking you. The path may bend in ways you did not plan, but the current knows the way to the sea.","planets":["Mercury","Uranus"],"element":"air"},
{"n":8,"slug":"anchor","key":"08-anchor","name":"The Anchor","keywords":["Stability","Grounding","Holding steady","Staying put"],"verdict":"NO","note":"hold, do not move yet","meaning":"The Anchor asks you to stay where you are and hold steady rather than make a move. This is a card of grounding, security, and the wisdom of remaining rooted while the waters shift around you. Not every season is for setting sail. Sometimes the most powerful act is to drop anchor and let the storm pass over you. The answer here is no, not because the desire is wrong, but because the timing calls for stillness and stability first. Strengthen your foundation. The right moment to lift the anchor has not yet come.","planets":["Saturn"],"element":"earth"},
{"n":9,"slug":"lighthouse","key":"09-lighthouse","name":"The Lighthouse","keywords":["Guidance","Hope","Beacon","Finding your way"],"verdict":"YES","note":"","meaning":"The Lighthouse stands as a steady beacon in the dark, guiding you safely home. When you have felt lost or storm-tossed, this card confirms that a light is shining for you and the way is being shown. You are not as alone or as adrift as you feared. Look for the signs guiding you back to shore; they have been there all along. This is a yes carried on the promise of guidance. Follow the light that keeps appearing on your horizon, and trust that it is leading you somewhere safe.","planets":["Sun","Jupiter"],"element":"fire"},
{"n":10,"slug":"compass","key":"10-compass","name":"The Compass","keywords":["Direction","True north","Purpose","Alignment"],"verdict":"YES","note":"","meaning":"The Compass points you back to your true north. You are being realigned with your purpose and shown the direction that is genuinely yours, not the one others expect of you. When you have felt unsure which way to turn, this card affirms that your inner sense of direction is reliable. Stop looking outward for permission and feel for the pull of your own true north. The answer is yes, you are headed the right way. Keep moving toward what feels aligned, and let your purpose set the heading.","planets":["Mercury","Jupiter"],"element":"air"},
{"n":11,"slug":"veil","key":"11-veil","name":"The Veil","keywords":["Mystery","The hidden","Not yet revealed","The unseen"],"verdict":"MAYBE","note":"you cannot know yet","meaning":"The Veil falls between you and the full truth of your situation. Something is still hidden, and you are not meant to see all of it yet. This is a sacred concealment, not a denial; the mystery is protecting you while the rest unfolds. Resist the urge to force clarity before its time. The answer is unclear for now, because the full picture has not been revealed and acting on partial sight would mislead you. Wait at the veil. When the moment is right, it will lift on its own and show you what was hidden.","planets":["Neptune"],"element":"water"},
{"n":12,"slug":"message","key":"12-message","name":"The Message","keywords":["News","Signs","Communication","Divine correspondence"],"verdict":"YES","note":"","meaning":"The Message has been sent and is on its way to you. A sign, a word, a piece of news, or an answer you have been waiting for is about to arrive. Stay alert to the synchronicities, conversations, and symbols appearing around you, because the universe is corresponding with you now. This card is a yes carried by the promise of communication. What you have been wondering about will soon be confirmed. Open the letter when it comes. The information you need is being delivered precisely when you are ready to receive it.","planets":["Mercury"],"element":"air"},
{"n":13,"slug":"protection","key":"13-protection","name":"The Protection","keywords":["Spiritual safety","Being guarded","The watchful eye","Shielding"],"verdict":"YES","note":"","meaning":"The Protection assures you that you are guarded by forces seen and unseen. The eye in the open palm is watching over your path, deflecting what is not meant for you and keeping you safe through the passage ahead. You can move forward without fear, because you are shielded. This is a yes wrapped in reassurance. Whatever you have worried might harm you is being held back. Proceed with confidence and trust the protection surrounding you. You are not exposed and you are not alone; a sacred guard walks the road beside you.","planets":["Mars","Saturn"],"element":"earth"},
{"n":14,"slug":"guides","key":"14-guides","name":"The Guides","keywords":["Spirit support","Unseen help","Ancestors","You are not alone"],"verdict":"YES","note":"","meaning":"The Guides remind you that you have never walked this path alone. Luminous helpers, ancestors, and unseen allies surround you, ready to support the steps you take next. When you have felt isolated in your decision, this card confirms that wisdom and assistance are available the moment you ask for them. The answer is yes, and it comes with reinforcements. Call on your guides, listen for their nudges, and let yourself be supported. The help you need is already gathered around you, waiting only for your willingness to receive it.","planets":["Neptune","Jupiter"],"element":"water"},
{"n":15,"slug":"roots","key":"15-roots","name":"The Roots","keywords":["Foundation","Ancestry","Grounding","Growth from depth"],"verdict":"YES","note":"","meaning":"The Roots speak to the unseen foundation that feeds everything you are growing. Before the tree rises, it must root deep, and you are being affirmed for the quiet, downward work of building strength from your depths. Your ancestry, your history, and your foundations are sound enough to support what comes next. This is a yes grounded in stability. What you are nurturing has good soil beneath it. Tend your roots and trust that what is planted in deep, well-fed ground will rise tall and endure the seasons ahead.","planets":["Saturn","Moon"],"element":"earth"},
{"n":16,"slug":"healing","key":"16-healing","name":"The Healing","keywords":["Restoration","Recovery","Medicine","Mending"],"verdict":"YES","note":"","meaning":"The Healing confirms that restoration is already underway. The medicine is brewing, the wound is closing, and what felt broken is being mended in its own gentle time. This card is a yes that asks for tenderness with yourself during the mending. Do not mistake the slowness of healing for failure; the work is happening beneath the surface. Drink the medicine, rest, and let yourself recover fully. What you have been carrying does not have to be carried forever. Wholeness is returning, and you are being made well again.","planets":["Chiron","Neptune"],"element":"water"},
{"n":17,"slug":"shadow","key":"17-shadow","name":"The Shadow","keywords":["Shadow work","The hidden self","Confrontation","Integration"],"verdict":"MAYBE","note":"do the inner work first","meaning":"The Shadow turns you toward the part of yourself you have kept in the dark. Before you can move forward cleanly, something hidden, denied, or unexamined asks to be met. This is not punishment but invitation; your shadow holds power you have disowned. The answer is not yet clear, because acting before you face what is unintegrated would only repeat an old pattern. Sit with what you would rather not look at. When you bring the hidden into the light and own it, the way forward will clear on its own.","planets":["Pluto","Saturn"],"element":"water"},
{"n":18,"slug":"release","key":"18-release","name":"The Release","keywords":["Letting go","Liberation","Freedom","Surrender"],"verdict":"YES","note":"","meaning":"The Release opens the cage door and shows you that you were never truly trapped. What you have been gripping, the grudge, the fear, the outcome, the old identity, is ready to be set free, and freedom is the answer waiting on the other side of your surrender. This is a yes that asks you to loosen your hold. The thing you fear losing by letting go is precisely what is keeping you caged. Open your hands. Liberation comes the moment you stop clutching what was never meant to be kept.","planets":["Pluto","Neptune"],"element":"water"},
{"n":19,"slug":"transformation","key":"19-transformation","name":"The Transformation","keywords":["Metamorphosis","Becoming","Change","Emergence"],"verdict":"YES","note":"","meaning":"The Transformation marks your metamorphosis. What you have been undergoing in the dark of the cocoon is nearly complete, and you are emerging as something new. This card is an emphatic yes to change. The old form had to dissolve for the new one to take shape, and that dissolving was never the end of your story. Trust the wings you are growing even if they still feel unfamiliar. You are not who you were, and you were never meant to stay that way. Emerge fully. Becoming is your nature.","planets":["Pluto"],"element":"water"},
{"n":20,"slug":"alignment","key":"20-alignment","name":"The Alignment","keywords":["Right timing","Syncing","Coherence","Cosmic order"],"verdict":"YES","note":"","meaning":"The Alignment confirms that the pieces are clicking into place. Like phases of the moon falling into sequence, your inner world and outer circumstances are coming into coherence, and the timing is right. When you have wondered whether something is meant for you, this card answers yes by showing you the order forming around your intention. You do not have to force the pieces; they are arranging themselves. Move in the direction that feels aligned and watch how smoothly the path opens. What is truly yours is lining up to meet you.","planets":["Sun","Jupiter"],"element":"fire"},
{"n":21,"slug":"intuition","key":"21-intuition","name":"The Intuition","keywords":["Inner knowing","Trust yourself","The third eye","Instinct"],"verdict":"YES","note":"trust the knowing","meaning":"The Intuition returns the authority to you. The answer you are seeking is not in another opinion or further research; it is already within you, waiting to be trusted. This card is a yes that points inward. That quiet knowing you keep second-guessing is your truest guidance. Stop overriding your gut with other people's logic. Your inner sight is open and accurate right now. Trust the first instinct, the body's yes or no, the knowing that arrives before the reasoning. You already have the answer. Have the courage to believe what you sense.","planets":["Moon","Neptune"],"element":"water"},
{"n":22,"slug":"sacred-no","key":"22-sacred-no","name":"The Sacred No","keywords":["Boundaries","Refusal","Self-protection","Sovereignty"],"verdict":"NO","note":"","meaning":"The Sacred No reminds you that refusal can be holy. Saying no is not unkind or selfish when it protects your energy, your peace, and your sovereignty. This card is a clear no, and it arrives as permission to decline what does not serve you without guilt or apology. Not every opportunity is yours to take, and not every request deserves your yes. Honor the wisdom of your refusal. The snake guards its own with rightful power. Your no is sacred, and saying it is an act of self-respect, not rejection.","planets":["Saturn","Mars"],"element":"earth"},
{"n":23,"slug":"boundary","key":"23-boundary","name":"The Boundary","keywords":["Limits","Separation","Protection","Holding the line"],"verdict":"NO","note":"","meaning":"The Boundary calls you to define where you end and another begins. A limit needs to be set, a line needs to be held, and the answer here is no until that boundary is honored. You have given access to something or someone that has crossed into territory meant to stay protected. This is not cruelty; it is the loving structure that keeps you whole. Hold the line even if it disappoints others. What you allow becomes what continues. Draw the boundary clearly, and let it be the no that protects your wholeness.","planets":["Saturn"],"element":"earth"},
{"n":24,"slug":"devotion","key":"24-devotion","name":"The Devotion","keywords":["Commitment","Dedication","Sacred practice","Faithfulness"],"verdict":"YES","note":"","meaning":"The Devotion asks for your wholehearted commitment, and it promises that what you give yourself to faithfully will reward you. This is a yes earned through dedication. The kneeling figure shows that surrendering to a practice, a path, or a love greater than convenience is where real power lives. Half-hearted effort will not unlock this; full devotion will. Commit to what you say matters. Show up for it daily, especially when no one is watching. What you tend with steady devotion grows roots deep enough to hold the weight of your dreams.","planets":["Venus","Moon"],"element":"water"},
{"n":25,"slug":"persistence","key":"25-persistence","name":"The Persistence","keywords":["Endurance","The long climb","Perseverance","Not giving up"],"verdict":"YES","note":"keep climbing","meaning":"The Persistence honors the long climb you are still in the middle of. The mountain is real and the summit is not yet reached, but the answer is yes if you refuse to quit. This card is the reward for endurance. What you are pursuing requires more stamina than you expected, and that does not mean it is wrong; it means it is worthy. Keep climbing. The view from the peak belongs to those who kept moving when the path got steep. Do not abandon the ascent now. You are closer than the doubt suggests.","planets":["Mars","Saturn"],"element":"fire"},
{"n":26,"slug":"patience","key":"26-patience","name":"The Patience","keywords":["Divine timing","Waiting","Stillness","Not yet"],"verdict":"MAYBE","note":"not yet, divine timing","meaning":"The Patience turns the hourglass and asks you to wait. The answer is not no, but not yet, because what you want is still forming and acting too soon would interrupt it. This is the hardest discipline, to trust timing you cannot control. The sand is still falling. What is meant for you is not running away; it is ripening. Resist the urge to force, rush, or grab. Let the hourglass empty in its own rhythm. When the timing is complete, the way will open, and your patience will prove to have been wisdom.","planets":["Saturn"],"element":"earth"},
{"n":27,"slug":"cleansing","key":"27-cleansing","name":"The Cleansing","keywords":["Purification","Clearing","Release of stagnancy","Fresh start"],"verdict":"YES","note":"clear first","meaning":"The Cleansing clears the air around your question. Before the new can enter, the old energy must be swept out, and this card is a yes that asks you to purify first. The smoke rises and carries away what has gone stagnant, stale, or heavy. Clear your space, your mind, and your spirit, and you will find the path forward suddenly open. This is a fresh start made possible by release. Do the clearing work, literal or energetic, and step into the cleaner air. What felt blocked dissolves once the smoke has done its work.","planets":["Moon","Neptune"],"element":"water"},
{"n":28,"slug":"gratitude","key":"28-gratitude","name":"The Gratitude","keywords":["Thankfulness","Appreciation","Abundance","The open heart"],"verdict":"YES","note":"","meaning":"The Gratitude opens the channel through which more arrives. When you place your hands on your heart and give thanks for what is already here, you align with abundance and call more of it toward you. This card is a yes rooted in appreciation. The fastest way to receive is to be grateful for what you have. Count the blessings you have been overlooking. Gratitude is not a denial of what you still want; it is the frequency that draws it closer. Give thanks, and watch the abundance multiply in the soil of your appreciation.","planets":["Venus","Jupiter"],"element":"earth"},
{"n":29,"slug":"abundance","key":"29-abundance","name":"The Abundance","keywords":["Prosperity","Overflow","Plenty","Harvest"],"verdict":"YES","note":"","meaning":"The Abundance overflows in your direction. This is a season of harvest, prosperity, and plenty, and the answer is an unmistakable yes. What you have planted is ripening into more than enough. Release the scarcity mindset that whispers there is not sufficient for you; the cornucopia is spilling over precisely because you are meant to receive. Allow yourself to have, to hold, and to enjoy what is arriving. Abundance is not only money; it is love, opportunity, and richness of life. Open wide. The overflow is yours to gather and share.","planets":["Jupiter","Venus"],"element":"earth"},
{"n":30,"slug":"receiving","key":"30-receiving","name":"The Receiving","keywords":["Openness","Allowing","Worthiness","Accepting"],"verdict":"YES","note":"","meaning":"The Receiving asks only that you open your hands. So much is trying to reach you, but you cannot hold it with clenched fists or a heart that believes it is undeserving. This card is a yes that hinges on your willingness to accept. Stop deflecting the help, the love, the gifts, and the support being offered. You are worthy of receiving without earning it through exhaustion. Turn your palms up. The light is pouring toward you, and all that remains is for you to let yourself actually take it in.","planets":["Venus","Moon"],"element":"water"},
{"n":31,"slug":"vision","key":"31-vision","name":"The Vision","keywords":["Clarity","Foresight","Manifestation","Seeing ahead"],"verdict":"YES","note":"","meaning":"The Vision sharpens your sight and shows you what is possible. The orb clears, and you can see the future you are calling toward you with surprising clarity. This card is a yes that rewards you for daring to envision. What you can picture vividly, you can begin to manifest. Hold the image of what you want without blurring it with doubt. Your ability to see it is the first act of creating it. Trust the vision rising in you now. It is not fantasy; it is a preview of what your focus is bringing into being.","planets":["Uranus","Jupiter"],"element":"fire"},
{"n":32,"slug":"faith","key":"32-faith","name":"The Faith","keywords":["Trust","Belief","Walking without proof","Surrendered confidence"],"verdict":"YES","note":"","meaning":"The Faith asks you to walk toward the light before you can see the whole path. The figure steps forward into the glow with nothing but trust, and that trust is exactly what is being asked of you. This card is a yes that requires belief ahead of evidence. You will not be given proof first; you must move, and the way will reveal itself as you go. Take the step. Faith is not the absence of uncertainty but the decision to proceed through it. The light grows brighter the further you walk into it.","planets":["Jupiter","Neptune"],"element":"fire"},
{"n":33,"slug":"leap","key":"33-leap","name":"The Leap","keywords":["Courage","Risk","Bold action","Jumping"],"verdict":"YES","note":"","meaning":"The Leap calls for the bold jump you have been hesitating to make. The dancer is already airborne, and the answer is an exhilarating yes to the risk you have been weighing. You will never feel completely ready, and waiting for certainty will keep you frozen on the edge. This card promises that the leap is supported. Trust your wings to open in the falling. What looks like a risk is actually the doorway to your expansion. Stop calculating and jump. The ground that worried you will rise to meet your landing.","planets":["Uranus","Jupiter"],"element":"fire"},
{"n":34,"slug":"flow","key":"34-flow","name":"The Flow","keywords":["Ease","Flow state","Effortlessness","Natural movement"],"verdict":"YES","note":"","meaning":"The Flow promises that things can be easeful now. The waterfall does not strain to fall; it simply moves with its nature, and you are invited into that same effortless momentum. This card is a yes that arrives without struggle. When you stop forcing and start flowing, the path smooths and the work becomes play. You have been making it harder than it needs to be. Drop into the current of what comes naturally to you. The ease you feel is not laziness; it is the signal that you are finally moving in alignment.","planets":["Neptune","Moon"],"element":"water"},
{"n":35,"slug":"union","key":"35-union","name":"The Union","keywords":["Partnership","Sacred union","Coming together","Integration"],"verdict":"YES","note":"","meaning":"The Union brings the sun and moon together in sacred partnership. Two halves are coming into harmony, whether that union is a relationship, a collaboration, or the integration of opposites within yourself. This card is a yes to coming together. What was separate is being woven into something whole and greater than its parts. Open to the connection forming around or within you. True union does not erase your individuality; it completes a sacred pairing. The merging you sense is blessed. Let yourself be joined to what your soul has been seeking to reunite with.","planets":["Venus"],"element":"air"},
{"n":36,"slug":"soul-contract","key":"36-soul-contract","name":"The Soul Contract","keywords":["Destiny","Soul agreements","Fated lessons","The written path"],"verdict":"YES","note":"","meaning":"The Soul Contract reveals that this was written before you arrived. The connection, the lesson, or the calling in question is part of an agreement your soul made, and the answer is yes because it is woven into your path. This card affirms that what is happening is not random; it is sacred curriculum. Even the difficult parts were chosen for your growth. Honor the contract unfolding. You are exactly where your soul agreed to be, learning what you came here to learn. Trust that this chapter is meant for you and walk it fully.","planets":["Saturn","Pluto"],"element":"water"},
{"n":37,"slug":"remembrance","key":"37-remembrance","name":"The Remembrance","keywords":["Soul memory","Reclaiming","Remembering your power","Return to self"],"verdict":"YES","note":"","meaning":"The Remembrance stirs a knowing that was always yours. You are not learning something new so much as remembering who you have always been beneath the forgetting. This card is a yes that asks you to reclaim your own power. Somewhere along the way you set down a piece of yourself, and now you are being called to pick it back up. Remember your strength, your worth, your magic. The answer you seek lives in what your soul already knows. Return to yourself. The remembering has already begun, and it cannot be undone.","planets":["Moon","Neptune"],"element":"water"},
{"n":38,"slug":"starseed","key":"38-starseed","name":"The Starseed","keywords":["Cosmic origin","Purpose","Otherworldly calling","Belonging to the stars"],"verdict":"YES","note":"","meaning":"The Starseed affirms that you carry a cosmic origin and a purpose larger than this single life. If you have always felt a little different, a little far from home, this card explains why and answers yes to the path your soul came here to walk. You are here intentionally, carrying a frequency this world needs. Stop trying to dim yourself to fit in. Your sense of being from somewhere else is not a flaw; it is a calling. Embody the purpose written in your stars. You belong to something vast, and it is awakening in you now.","planets":["Uranus","Neptune"],"element":"air"},
{"n":39,"slug":"home","key":"39-home","name":"The Home","keywords":["Belonging","Sanctuary","Return to self","Safety"],"verdict":"YES","note":"","meaning":"The Home glows like a doorway lit for your arrival. This card is a yes that speaks of belonging, sanctuary, and the deep relief of coming back to where you are safe. Whether home is a place, a person, or your own inner refuge, you are being welcomed back. The longing you have felt is being answered. Cross the threshold into the warmth waiting for you. You do not have to keep wandering or proving yourself worthy of rest. Home has kept the light on for you, and the door is open. Come in.","planets":["Moon"],"element":"water"},
{"n":40,"slug":"completion","key":"40-completion","name":"The Completion","keywords":["Closure","Wholeness","Cycle finished","Fulfillment"],"verdict":"YES","note":"","meaning":"The Completion closes the circle. The ouroboros shows a cycle reaching its natural end, and the answer is yes because something is finally finished and whole. What you have been working toward, waiting on, or laboring through has reached its fulfillment. Honor the ending rather than rushing past it. Completion is its own reward, and it makes space for the next beginning. Let yourself feel the satisfaction of a circle closed well. You have done what this cycle required. Rest in the wholeness of it. What is complete needs nothing more from you now.","planets":["Saturn","Sun"],"element":"earth"},
{"n":41,"slug":"cycles","key":"41-cycles","name":"The Cycles","keywords":["Recurrence","Seasons","Timing","What comes around"],"verdict":"MAYBE","note":"wait for the cycle to turn","meaning":"The Cycles remind you that life moves in turning seasons, and this one has not yet come full circle. The answer is not yet, not as a denial but as a recognition that the wheel is still turning toward your moment. What is not happening yet may simply be in a different phase of its cycle. Notice the pattern repeating and ask what it keeps trying to teach you. Forcing a season to skip ahead never works. Wait for the cycle to turn. When the wheel comes back around, the timing you wanted will finally arrive.","planets":["Moon","Saturn"],"element":"water"},
{"n":42,"slug":"legacy","key":"42-legacy","name":"The Legacy","keywords":["Lasting impact","Ancestry forward","What you leave behind","The tree of life"],"verdict":"YES","note":"","meaning":"The Legacy expands your view beyond the immediate moment to what you are building for those who come after you. This card is a yes that asks you to think in terms of roots and branches, of what will outlast you. What you are creating now has the potential to endure for generations. Plant with the future in mind. The tree of life shows that your choices ripple far beyond your own lifetime. Build something worthy of being inherited. The answer is yes, and it carries the weight and honor of lasting impact.","planets":["Saturn","Jupiter"],"element":"earth"},
{"n":43,"slug":"destiny","key":"43-destiny","name":"The Destiny","keywords":["Fate","Alignment with the stars","The destined path","Purpose"],"verdict":"YES","note":"","meaning":"The Destiny confirms that this is written in your stars. The path in question is not a detour but a destined alignment, and the answer is an affirming yes. The constellations of your life are arranging around this moment for a reason. What feels fated is fated. Stop questioning whether you deserve to walk toward what calls you so strongly; that pull is your destiny speaking. Move with conviction. The stars charted this course before you were born, and they are guiding you toward it now. Trust the destined path opening beneath your feet.","planets":["Jupiter","Pluto"],"element":"fire"},
{"n":44,"slug":"return","key":"44-return","name":"The Return","keywords":["Rebirth","Full circle","Return to source","Renewal"],"verdict":"YES","note":"","meaning":"The Return brings you back, renewed, from the waters of transformation. The figure rises from the depths reborn, and this card is a yes that speaks of full-circle renewal. What left is coming back changed, or you are returning to a truth you once abandoned, wiser than before. This is not regression; it is rebirth. Whatever you thought was lost is finding its way home in a new form. Rise from the water. The cycle that took you under is now returning you to the surface, restored. What returns to you now is meant to stay.","planets":["Moon","Saturn"],"element":"water"}];

/* exact historical UTC offset for a zone+date, DST-aware, leap-year-safe (powers the birth-time fix too) */
function mwZoneOffsetHours(zone,y,m,d){
  var asUTC=Date.UTC(y,m-1,d,12,0);
  var dtf=new Intl.DateTimeFormat("en-US",{timeZone:zone,hourCycle:"h23",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
  var parts={}; dtf.formatToParts(new Date(asUTC)).forEach(function(p){parts[p.type]=p.value;});
  var zoned=Date.UTC(parts.year,parts.month-1,parts.day,parts.hour,parts.minute);
  return Math.round((zoned-asUTC)/60000)/60;
}

var MW_SIGN_ELEMENT={Aries:"fire",Leo:"fire",Sagittarius:"fire",Taurus:"earth",Virgo:"earth",Capricorn:"earth",Gemini:"air",Libra:"air",Aquarius:"air",Cancer:"water",Scorpio:"water",Pisces:"water"};
function mwNormPlanet(n){ if(!n)return null; n=String(n); if(/node/i.test(n))return "Node"; if(/lilith/i.test(n))return "Lilith"; if(/chiron/i.test(n))return "Chiron"; var k=["Sun","Moon","Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"]; for(var i=0;i<k.length;i++)if(n.indexOf(k[i])!==-1)return k[i]; return null; }
function mwAspectTone(t){ if(t==="trine"||t==="sextile")return "YES"; if(t==="square"||t==="opposition")return "NO"; return null; }

var mwTarot=(function(){
  var current={sig:null,type:""};

  function buildSig(type,data){
    var planets={},elements={fire:0,earth:0,air:0,water:0},tone={YES:0,NO:0,MAYBE:0};
    var top={label:"",w:-1};
    function aP(n,w){ var p=mwNormPlanet(n); if(p)planets[p]=(planets[p]||0)+w; }
    function aE(sign,w){ var e=MW_SIGN_ELEMENT[sign]; if(e)elements[e]+=w; }
    function procAsp(asps){
      if(!asps||!asps.length)return;
      asps.forEach(function(a){
        var orb=parseFloat(a.orb); if(isNaN(orb))orb=5;
        var w=Math.max(0.15,1-(orb/10));
        aP(a.point1,w); aP(a.point2,w*0.6);
        var t=mwAspectTone(a.type); if(t){tone[t]+=w*0.8;} else {tone.YES+=w*0.25;tone.MAYBE+=w*0.15;}
        if(w>top.w){ top.w=w; top.label=a.point1+" "+a.type+" "+a.point2; }
      });
    }
    if(type==="transit"){
      procAsp(data.interAspects);
      (data.transitPlanets||[]).forEach(function(p){ aE(p.sign,0.4); aP(p.name,0.15); });
    } else if(type==="synastry"){
      procAsp(data.interAspects);
      ((data.natalA&&data.natalA.planets)||[]).forEach(function(p){ aE(p.sign,0.2); });
      ((data.natalB&&data.natalB.planets)||[]).forEach(function(p){ aE(p.sign,0.2); });
      if(top.label)top.label="connection: "+top.label;
    } else if(type==="human-design"){
      (data.personalityPlanets||[]).concat(data.designPlanets||[]).forEach(function(pl){ aP(pl.name,0.4); });
      tone.YES+=1;
    } else {
      procAsp(data.aspects);
      (data.planets||[]).forEach(function(p){ aE(p.sign,0.3); aP(p.name,0.2); });
      if(data.angles&&data.angles.ascendant){ aE(data.angles.ascendant.sign,1.0); }
    }
    return {planets:planets,elements:elements,tone:tone,top:top.label};
  }

  function score(card,sig){
    var s=0;
    (card.planets||[]).forEach(function(pl){ s+=(sig.planets[pl]||0); });
    s+=(sig.elements[card.element]||0)*0.8;
    s+=(sig.tone[card.verdict]||0)*0.5;
    return s;
  }

  function pick(sig,exclude){
    var max=0,i;
    for(i=0;i<MW_DECK.length;i++){ var sc=score(MW_DECK[i],sig); if(sc>max)max=sc; }
    var floor=(max>0?max*0.18:1);
    var pool=[],tot=0;
    for(i=0;i<MW_DECK.length;i++){ if(exclude.indexOf(i)!==-1)continue; var w=score(MW_DECK[i],sig)+floor; pool.push({i:i,w:w}); tot+=w; }
    var r=Math.random()*tot,acc=0;
    for(i=0;i<pool.length;i++){ acc+=pool[i].w; if(r<=acc)return pool[i].i; }
    return pool.length?pool[pool.length-1].i:0;
  }

  function imgFor(c){ return MW_CARD_BASE+c.key+".png"; }
  function promptFor(v){ if(v==="YES")return "Where in your life is this already saying yes? Name the next honest step."; if(v==="NO")return "What are you being asked to hold, refuse, or protect right now?"; return "What needs more reflection or more time before you decide? Sit with it."; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function readingHTML(c,big){
    var keys=(c.keywords||[]).map(function(k){return '<span>'+esc(k)+'</span>';}).join('');
    return '<div class="mw-tcard">'+
      '<div class="mw-tart"><img src="'+imgFor(c)+'" alt="'+esc(c.name)+'" loading="lazy" onerror="this.parentNode.classList.add(\'noimg\');this.parentNode.setAttribute(\'data-n\',\''+c.n+'\');this.remove();"></div>'+
      '<span class="mw-tnum">Card '+c.n+' of 44</span>'+
      '<h3 class="mw-tname">'+esc(c.name)+'</h3>'+
      '<div class="mw-tverdict '+c.verdict+'"><span class="lbl">Verdict</span><span class="val"'+(big?'':' style="font-size:30px"')+'>'+c.verdict+'</span>'+(c.note?'<span class="note">'+esc(c.note)+'</span>':'')+'</div>'+
      '<div class="mw-tkeys">'+keys+'</div>'+
      '<div class="mw-tdiv">&#10022; meaning &#10022;</div>'+
      '<p class="mw-tmeaning">'+esc(c.meaning)+'</p>'+
      (big?'<div class="mw-tprompt"><b>Reflect</b>'+promptFor(c.verdict)+'</div>':'')+
    '</div>';
  }

  var SPREAD_POS=["The season you\u2019re in","What\u2019s moving toward you","What it asks of you"];
  function drawOne(box){ var idx=pick(current.sig,[]); box.innerHTML=readingHTML(MW_DECK[idx],true); }
  function drawThree(box){
    var picks=[]; while(picks.length<3){ picks.push(pick(current.sig,picks)); }
    box.innerHTML=picks.map(function(idx,i){ return '<div class="mw-spos"><span class="mw-poslbl">'+SPREAD_POS[i]+'</span>'+readingHTML(MW_DECK[idx],false)+'</div>'; }).join('');
  }

  function mount(type,data){
    var rd=document.getElementById("result");
    if(!rd)return;
    try{ current.sig=buildSig(type,data); current.type=type; }
    catch(e){ current.sig={planets:{},elements:{fire:0,earth:0,air:0,water:0},tone:{YES:1,NO:0,MAYBE:0},top:""}; }
    var seed=current.sig.top
      ? '<div class="mw-seed">Seeded by your chart: <em>'+esc(current.sig.top)+'</em></div>'
      : '<div class="mw-seed">Seeded by this chart\u2019s signature.</div>';
    var sec=document.createElement("section");
    sec.className="mw-tarot";
    sec.innerHTML=
      '<div class="mw-trule">&#10022;</div>'+
      '<div class="mw-teyebrow">Manifest 22 Oracle</div>'+
      '<h2 class="mw-ttitle">A card for this chart</h2>'+
      seed+
      '<div class="mw-ttabs"><button type="button" class="mw-ttab active" data-mode="one">One Card</button><button type="button" class="mw-ttab" data-mode="three">Three Cards</button></div>'+
      '<div class="mw-tstage"><div class="mw-tback" id="mwTback"><img src="'+MW_CARD_BASE+'back.png" alt="Draw a card" onerror="this.parentNode.classList.add(\'noimg\');this.remove();"></div></div>'+
      '<button type="button" class="mw-tdraw" id="mwTdraw">Draw your card</button>'+
      '<div class="mw-tout" id="mwTout"></div>';
    rd.appendChild(sec);
    var mode="one";
    var out=sec.querySelector("#mwTout");
    var stage=sec.querySelector(".mw-tstage");
    var drawBtn=sec.querySelector("#mwTdraw");
    sec.querySelectorAll(".mw-ttab").forEach(function(tb){
      tb.addEventListener("click",function(){
        sec.querySelectorAll(".mw-ttab").forEach(function(x){x.classList.remove("active");});
        tb.classList.add("active"); mode=tb.getAttribute("data-mode");
        out.classList.remove("show"); out.innerHTML=""; stage.style.display="flex";
        drawBtn.style.display=""; drawBtn.textContent=(mode==="one"?"Draw your card":"Draw three cards");
      });
    });
    function go(){ stage.style.display="none"; drawBtn.style.display="none"; if(mode==="one")drawOne(out); else drawThree(out); requestAnimationFrame(function(){ requestAnimationFrame(function(){ out.classList.add("show"); }); }); }
    drawBtn.addEventListener("click",go);
    sec.querySelector("#mwTback").addEventListener("click",go);
    mwPostHeight();setTimeout(function(){mwPostHeight();mwScrollToChart();},150);
  }

  return {mount:mount};
})();


window.addEventListener('load',restoreState);
</script>
</body>
</html>
