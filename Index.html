<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mami Wata's Mirror — Chart Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: #0a1028;
    color: #f0ead6;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    font-size: 32px; font-style: italic; text-align: center;
    margin-bottom: 8px; color: #e0c077;
  }
  .subtitle {
    text-align: center; color: #a8a08a; margin-bottom: 32px;
    font-style: italic; font-size: 15px;
  }
  .form-card {
    background: rgba(255,255,255,0.04); padding: 24px;
    border: 1px solid rgba(224,192,119,0.3); margin-bottom: 24px;
  }
  label {
    display: block; font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; color: #c9a961; margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-child { margin-top: 0; }
  input, select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    background: rgba(0,0,0,0.3); color: #f0ead6;
    border: 1px solid rgba(240,234,214,0.2);
    font-family: Georgia, serif;
  }
  input:focus, select:focus { outline: none; border-color: #c9a961; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
  button {
    width: 100%; margin-top: 20px; padding: 14px;
    background: #c9a961; color: #0a1028; border: none;
    font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; font-family: Georgia, serif;
  }
  button:hover { background: #e0c077; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .helper {
    font-size: 12px; color: #888; margin-top: 4px; font-style: italic;
  }
  #result { margin-top: 32px; }
  .chart-wrapper {
    background: rgba(255,255,255,0.04); padding: 24px;
    border: 1px solid rgba(224,192,119,0.3);
  }
  .chart-wrapper h2 {
    font-size: 22px; font-style: italic; text-align: center;
    color: #e0c077; margin-bottom: 16px;
  }
  svg.wheel { display: block; margin: 0 auto; max-width: 100%; height: auto; }
  .data-table {
    width: 100%; border-collapse: collapse; margin-top: 24px;
    font-size: 14px;
  }
  .data-table th {
    text-align: left; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: #c9a961; padding: 8px;
    border-bottom: 1px solid rgba(240,234,214,0.2);
  }
  .data-table td {
    padding: 8px; border-bottom: 1px solid rgba(240,234,214,0.08);
  }
  .data-table .deg { color: #e0c077; font-weight: bold; }
  .section-title {
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #c9a961; margin: 28px 0 12px;
  }
  .error {
    background: rgba(196,69,54,0.15); border: 1px solid #c44536;
    padding: 14px; color: #f0ead6; margin-top: 16px;
  }
  .loading { text-align: center; color: #c9a961; padding: 24px; font-style: italic; }
  .location-results {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(240,234,214,0.2);
    border-top: none; max-height: 200px; overflow-y: auto;
  }
  .location-result {
    padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(240,234,214,0.05);
    font-size: 14px;
  }
  .location-result:hover { background: rgba(201,169,97,0.1); }
</style>
</head>
<body>
  <div class="container">
    <h1>Mami Wata's Mirror</h1>
    <p class="subtitle">Generate your natal chart with exact degrees</p>

```
<div class="form-card">
  <div class="row">
    <div>
      <label>Birth Date</label>
      <input type="date" id="birth-date" required>
    </div>
    <div>
      <label>Birth Time</label>
      <input type="time" id="birth-time" required>
      <div class="helper">If unknown, use 12:00 (noon)</div>
    </div>
  </div>

  <label>Birth Location</label>
  <input type="text" id="location-search" placeholder="City, Country (e.g. Austin, USA)" autocomplete="off">
  <div id="location-results"></div>
  <input type="hidden" id="latitude">
  <input type="hidden" id="longitude">
  <div id="selected-location" class="helper" style="color:#e0c077;"></div>

  <label>House System</label>
  <select id="house-system">
    <option value="placidus">Placidus</option>
    <option value="whole-sign">Whole Sign</option>
  </select>

  <button id="generate-btn">Generate Chart</button>
</div>

<div id="result"></div>
```

  </div>

<script>
// ---------- Location autocomplete using OpenStreetMap (free, no API key) ----------
const locationInput = document.getElementById('location-search');
const locationResults = document.getElementById('location-results');
const latInput = document.getElementById('latitude');
const lngInput = document.getElementById('longitude');
const selectedLocation = document.getElementById('selected-location');

let searchTimeout;
locationInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const query = locationInput.value.trim();
  if (query.length < 3) {
    locationResults.innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(async () => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`);
      const data = await res.json();
      locationResults.innerHTML = '<div class="location-results">' +
        data.map(r => `<div class="location-result" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.display_name.replace(/"/g, '&quot;')}">${r.display_name}</div>`).join('') +
        '</div>';
      document.querySelectorAll('.location-result').forEach(el => {
        el.addEventListener('click', () => {
          latInput.value = el.dataset.lat;
          lngInput.value = el.dataset.lon;
          locationInput.value = el.dataset.name;
          selectedLocation.textContent = `✓ ${el.dataset.name} (${parseFloat(el.dataset.lat).toFixed(2)}, ${parseFloat(el.dataset.lon).toFixed(2)})`;
          locationResults.innerHTML = '';
        });
      });
    } catch (e) {
      console.error('Location search failed', e);
    }
  }, 400);
});

// ---------- Generate chart ----------
const btn = document.getElementById('generate-btn');
const resultDiv = document.getElementById('result');

btn.addEventListener('click', async () => {
  const dateVal = document.getElementById('birth-date').value;
  const timeVal = document.getElementById('birth-time').value;
  const lat = latInput.value;
  const lng = lngInput.value;
  const houseSystem = document.getElementById('house-system').value;

  if (!dateVal || !timeVal || !lat || !lng) {
    resultDiv.innerHTML = '<div class="error">Please fill in all fields and select a location from the dropdown.</div>';
    return;
  }

  const [year, month, day] = dateVal.split('-').map(Number);
  const [hour, minute] = timeVal.split(':').map(Number);

  resultDiv.innerHTML = '<div class="loading">Calculating your chart...</div>';
  btn.disabled = true;

  try {
    const res = await fetch('/api/calculate-chart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ year, month, day, hour, minute, latitude: parseFloat(lat), longitude: parseFloat(lng), houseSystem }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || data.error || 'Unknown error');
    renderChart(data);
  } catch (err) {
    resultDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
});

// ---------- Render chart ----------
const SIGN_SYMBOLS = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const SIGN_NAMES = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

function renderChart(data) {
  const ascLon = data.angles.ascendant.eclipticLongitude;

  function eclToSvg(lon) { return 180 + (lon - ascLon); }
  function polar(cx, cy, r, deg) {
    const rad = (deg * Math.PI) / 180;
    return { x: cx + r * Math.cos(rad), y: cy - r * Math.sin(rad) };
  }

  const cx = 300, cy = 300;
  const planetsToShow = data.planets.filter(p =>
    ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto','northnode','chiron'].includes(p.key)
  );

  let svg = `<svg class="wheel" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">`;

  // Outer rings
  svg += `<circle cx="${cx}" cy="${cy}" r="280" fill="none" stroke="#c9a961" stroke-width="1" opacity="0.7"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="250" fill="none" stroke="#c9a961" stroke-width="1" opacity="0.7"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="190" fill="none" stroke="#e8e1cc" stroke-width="0.5" opacity="0.2"/>`;

  // Sign divisions
  for (let i = 0; i < 12; i++) {
    const angle = eclToSvg(i * 30);
    const p1 = polar(cx, cy, 250, angle);
    const p2 = polar(cx, cy, 280, angle);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#c9a961" stroke-width="1" opacity="0.5"/>`;
  }

  // Degree ticks
  for (let d = 0; d < 360; d++) {
    const angle = eclToSvg(d);
    const isMajor = d % 10 === 0;
    const tickLen = isMajor ? 6 : (d % 5 === 0 ? 4 : 2);
    const p1 = polar(cx, cy, 280, angle);
    const p2 = polar(cx, cy, 280 - tickLen, angle);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#c9a961" stroke-width="${isMajor ? 1 : 0.5}" opacity="${isMajor ? 0.85 : 0.4}"/>`;
  }

  // Sign glyphs
  for (let i = 0; i < 12; i++) {
    const angle = eclToSvg(i * 30 + 15);
    const pos = polar(cx, cy, 265, angle);
    svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="#e0c077" font-size="22" font-family="Georgia, serif">${SIGN_SYMBOLS[i]}</text>`;
  }

  // House cusps
  data.houses.forEach((house, i) => {
    const angle = eclToSvg(house.eclipticLongitude);
    const p1 = polar(cx, cy, 80, angle);
    const p2 = polar(cx, cy, 250, angle);
    const isAngle = [0, 3, 6, 9].includes(i);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#e8e1cc" stroke-width="${isAngle ? 1 : 0.5}" opacity="${isAngle ? 0.6 : 0.3}"/>`;
  });

  // House numbers
  data.houses.forEach((house, i) => {
    const nextHouse = data.houses[(i + 1) % 12];
    let midLon = (house.eclipticLongitude + nextHouse.eclipticLongitude) / 2;
    if (nextHouse.eclipticLongitude < house.eclipticLongitude) midLon = ((house.eclipticLongitude + nextHouse.eclipticLongitude + 360) / 2) % 360;
    const midAngle = eclToSvg(midLon);
    const numPos = polar(cx, cy, 100, midAngle);
    svg += `<text x="${numPos.x}" y="${numPos.y}" text-anchor="middle" dominant-baseline="central" fill="#a8a08a" font-size="11" font-style="italic">${house.number}</text>`;
  });

  // Aspect lines
  const aspectColors = { conjunction: '#e0c077', opposition: '#c44536', trine: '#6b8e4e', square: '#c44536', sextile: '#4a6b8e' };
  data.aspects.forEach(asp => {
    const p1 = planetsToShow.find(p => p.key === asp.point1) || (asp.point1 === 'ascendant' ? data.angles.ascendant : asp.point1 === 'midheaven' ? data.angles.midheaven : null);
    const p2 = planetsToShow.find(p => p.key === asp.point2) || (asp.point2 === 'ascendant' ? data.angles.ascendant : asp.point2 === 'midheaven' ? data.angles.midheaven : null);
    if (!p1 || !p2) return;
    const a1 = eclToSvg(p1.eclipticLongitude);
    const a2 = eclToSvg(p2.eclipticLongitude);
    const pp1 = polar(cx, cy, 160, a1);
    const pp2 = polar(cx, cy, 160, a2);
    const color = aspectColors[asp.type] || '#888';
    const dash = ['square', 'opposition'].includes(asp.type) ? 'stroke-dasharray="2,3"' : '';
    svg += `<line x1="${pp1.x}" y1="${pp1.y}" x2="${pp2.x}" y2="${pp2.y}" stroke="${color}" stroke-width="0.7" opacity="0.55" ${dash}/>`;
  });

  // Inner circles
  svg += `<circle cx="${cx}" cy="${cy}" r="80" fill="none" stroke="#c9a961" stroke-width="0.5" opacity="0.4"/>`;

  // ASC/MC labels
  ['ascendant', 'midheaven'].forEach(key => {
    const angle = key === 'ascendant' ? eclToSvg(data.angles.ascendant.eclipticLongitude) : eclToSvg(data.angles.midheaven.eclipticLongitude);
    const labelPos = polar(cx, cy, 298, angle);
    svg += `<text x="${labelPos.x}" y="${labelPos.y}" text-anchor="middle" dominant-baseline="central" fill="#e0c077" font-size="10" letter-spacing="2">${key === 'ascendant' ? 'ASC' : 'MC'}</text>`;
  });

  // Planets — handle clustering by nudging outward
  const sorted = [...planetsToShow].map((p, i) => ({ ...p, originalIndex: i })).sort((a, b) => a.eclipticLongitude - b.eclipticLongitude);
  const nudges = new Array(planetsToShow.length).fill(0);
  for (let i = 1; i < sorted.length; i++) {
    let diff = Math.abs(sorted[i].eclipticLongitude - sorted[i-1].eclipticLongitude);
    if (diff > 180) diff = 360 - diff;
    if (diff < 7) nudges[sorted[i].originalIndex] = nudges[sorted[i-1].originalIndex] + 18;
  }

  planetsToShow.forEach((p, idx) => {
    const angle = eclToSvg(p.eclipticLongitude);
    const adjR = 215 + nudges[idx];
    const pos = polar(cx, cy, adjR, angle);
    const tickStart = polar(cx, cy, 250, angle);
    const tickEnd = polar(cx, cy, adjR + 12, angle);
    svg += `<line x1="${tickStart.x}" y1="${tickStart.y}" x2="${tickEnd.x}" y2="${tickEnd.y}" stroke="#e0c077" stroke-width="0.5" opacity="0.45"/>`;
    svg += `<circle cx="${pos.x}" cy="${pos.y}" r="13" fill="#0a1028" stroke="#e0c077" stroke-width="0.7"/>`;
    svg += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="central" fill="#e0c077" font-size="16" font-family="Georgia, serif">${p.symbol}</text>`;
    const degPos = polar(cx, cy, adjR + 22, angle);
    svg += `<text x="${degPos.x}" y="${degPos.y}" text-anchor="middle" dominant-baseline="central" fill="#c9a961" font-size="9">${p.degreesInSign}°</text>`;
  });

  svg += `</svg>`;

  // Tables
  let html = `<div class="chart-wrapper"><h2>Your Natal Chart</h2>${svg}`;
  html += `<div class="section-title">Planets</div><table class="data-table">
    <thead><tr><th>Planet</th><th>Sign</th><th>Position</th><th>House</th></tr></thead><tbody>`;
  planetsToShow.forEach(p => {
    html += `<tr>
      <td>${p.symbol} ${p.name}</td>
      <td>${p.signSymbol} ${p.sign}</td>
      <td><span class="deg">${p.degreesInSign}°</span> ${String(p.minutes).padStart(2,'0')}'${String(p.seconds).padStart(2,'0')}"</td>
      <td>${p.house || '—'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  html += `<div class="section-title">Houses</div><table class="data-table">
    <thead><tr><th>House</th><th>Sign</th><th>Cusp Position</th></tr></thead><tbody>`;
  data.houses.forEach(h => {
    html += `<tr>
      <td>House ${h.number}</td>
      <td>${h.signSymbol} ${h.sign}</td>
      <td><span class="deg">${h.degreesInSign}°</span> ${String(h.minutes).padStart(2,'0')}'</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  if (data.aspects && data.aspects.length) {
    html += `<div class="section-title">Aspects</div><table class="data-table">
      <thead><tr><th>From</th><th>Aspect</th><th>To</th><th>Orb</th></tr></thead><tbody>`;
    data.aspects.slice(0, 30).forEach(a => {
      html += `<tr><td>${a.point1}</td><td>${a.type}</td><td>${a.point2}</td><td>${parseFloat(a.orb).toFixed(2)}°</td></tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `</div>`;
  resultDiv.innerHTML = html;
}
</script>

</body>
</html>
